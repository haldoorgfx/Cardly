  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8fa57177-3b5e-45ae-925a-cc4e7347c911\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"cdc792b7-00ba-4e2f-9aa4-41b6ca8494f7\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9541deb7-fd42-4698-a8f6-aee6e6ca5db0\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9382a97e-a2dd-40a6-a968-4dd17d1e711c\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"6b43a266-2de5-4af1-a433-886fe91d9add\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b49e9c24-d939-4dda-b001-f33a3c64030c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8fa57177-3b5e-45ae-925a-cc4e7347c911\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   KARTA — shared design tokens & primitives\n   Source of truth for all 11 artifacts\n   ============================================================ */\n\n:root {\n  /* Forest */\n  --forest:         #1F4D3A;\n  --forest-dark:    #0D1F17;\n  --forest-card:    #162D22;\n  --forest-surface: #1E3D2D;\n  --forest-soft:    #E8EFEB;\n\n  /* Gold */\n  --gold:        #E8C57E;\n  --gold-hover:  #C9A45E;\n  --gold-soft:   #F5E9CC;\n\n  /* Cream */\n  --cream-canvas:  #FAF6EE;\n  --cream-surface: #FFFFFF;\n  --cream-soft:    #F0EDE8;\n  --cream-border:  #E5E0D4;\n\n  /* Ink */\n  --ink:       #0F1F18;\n  --ink-soft:  #3A4A42;\n  --ink-muted: #6B7A72;\n\n  /* Status */\n  --success: #2D7A4F;\n  --warning: #C9A45E;\n  --error:   #B8423C;\n\n  /* Radius */\n  --r-card: 8px;\n  --r-btn: 6px;\n  --r-input: 6px;\n  --r-pill: 999px;\n  --r-modal: 12px;\n\n  /* Elevation */\n  --e1: 0 1px 3px rgba(15,31,24,0.06);\n  --e2: 0 4px 16px rgba(15,31,24,0.1);\n\n  /* Fonts */\n  --display: 'DM Sans', sans-serif;\n  --body: 'Inter', sans-serif;\n  --mono: 'JetBrains Mono', monospace;\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nbody { font-family: var(--body); color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n\n/* Cardly signature: forest text selection */\n::selection { background: var(--forest); color: var(--cream-canvas); }\n::-moz-selection { background: var(--forest); color: var(--cream-canvas); }\n\n/* The forest→gold atmospheric mesh (marketing hero / mobile accent) */\n.mesh {\n  background:\n    radial-gradient(ellipse 60% 80% at 10% 50%, #1F4D3A 0%, transparent 65%),\n    radial-gradient(ellipse 50% 60% at 85% 15%, rgba(232,197,126,0.4) 0%, transparent 55%),\n    radial-gradient(ellipse 40% 50% at 65% 85%, rgba(42,106,80,0.3) 0%, transparent 50%),\n    var(--cream-canvas);\n}\n.mesh-dark {\n  background:\n    radial-gradient(ellipse 70% 60% at 15% 10%, rgba(31,77,58,0.9) 0%, transparent 60%),\n    radial-gradient(ellipse 60% 50% at 90% 30%, rgba(232,197,126,0.22) 0%, transparent 55%),\n    radial-gradient(ellipse 50% 60% at 60% 95%, rgba(42,106,80,0.35) 0%, transparent 55%),\n    var(--forest-dark);\n}\n\n/* ---------- Type scale (utility classes) ---------- */\n.t-display-xl { font-family: var(--display); font-weight: 400; font-size: 40px; letter-spacing: -0.03em; line-height: 1.15; }\n.t-display-lg { font-family: var(--display); font-weight: 400; font-size: 32px; letter-spacing: -0.028em;  line-height: 1.2; }\n.t-display-md { font-family: var(--display); font-weight: 500; font-size: 24px; letter-spacing: -0.015em; line-height: 1.25; }\n.t-heading    { font-family: var(--display); font-weight: 600; font-size: 20px; line-height: 1.3; }\n.t-subhead    { font-family: var(--display); font-weight: 500; font-size: 16px; line-height: 1.4; }\n.t-body       { font-family: var(--body); font-weight: 400; font-size: 16px; line-height: 1.5; }\n.t-body-sm    { font-family: var(--body); font-weight: 400; font-size: 14px; line-height: 1.5; }\n.t-caption    { font-family: var(--body); font-weight: 500; font-size: 12px; letter-spacing: 0.02em; line-height: 1.4; }\n.t-num-lg     { font-family: var(--mono); font-weight: 500; font-size: 28px; font-variant-numeric: tabular-nums; }\n.t-num-md     { font-family: var(--mono); font-weight: 400; font-size: 16px; font-variant-numeric: tabular-nums; }\n.t-num-sm     { font-family: var(--mono); font-weight: 400; font-size: 13px; font-variant-numeric: tabular-nums; }\n.mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }\n\n/* ---------- Photo placeholder system ----------\n   Layered mesh that reads as \"photography\" without being a flat block.\n   Drive hue via --h (0–360). Variants for events vs people.        */\n.ph {\n  position: relative;\n  overflow: hidden;\n  background-color: hsl(var(--h, 150) 28% 22%);\n  background-image:\n    radial-gradient(ellipse 80% 70% at 25% 20%, hsla(var(--h,150) 45% 45% / .85) 0%, transparent 60%),\n    radial-gradient(ellipse 70% 80% at 85% 75%, hsla(calc(var(--h,150) + 30) 50% 30% / .9) 0%, transparent 60%),\n    radial-gradient(ellipse 60% 60% at 60% 40%, hsla(45 60% 70% / .18) 0%, transparent 55%),\n    linear-gradient(135deg, hsl(var(--h,150) 35% 28%), hsl(calc(var(--h,150) - 25) 30% 16%));\n}\n.ph::after { /* subtle grain/texture */\n  content: \"\"; position: absolute; inset: 0;\n  background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);\n  background-size: 4px 4px; mix-blend-mode: overlay;\n}\n.ph-label { /* small category/initials tag inside a placeholder */\n  position: absolute; z-index: 2; font-family: var(--body); font-weight: 500;\n  font-size: 11px; letter-spacing: 0.04em; color: rgba(255,255,255,0.85);\n}\n.ph-initials {\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--display); font-weight: 500; color: var(--gold);\n}\n/* gradient scrim for text over photos */\n.scrim-b { background: linear-gradient(to top, rgba(8,18,12,0.92) 0%, rgba(8,18,12,0.55) 30%, transparent 70%); }\n\n/* ---------- Buttons — Cardly confident CTA: layered shadow, present without shouting ---------- */\n.btn { font-family: var(--display); font-weight: 500; border: none; cursor: pointer;\n  border-radius: var(--r-btn); display: inline-flex; align-items: center; justify-content: center;\n  gap: 8px; transition: transform .2s ease, box-shadow .2s ease, background .15s, border-color .15s, color .15s; }\n.btn-forest { background: var(--forest); color: #fff;\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.25), 0 0 32px rgba(31,77,58,0.10); }\n.btn-forest:hover { background: #18402F; transform: translateY(-1px);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 6px 18px rgba(31,77,58,0.32), 0 0 40px rgba(31,77,58,0.18); }\n.btn-gold { background: var(--gold); color: var(--ink);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.35), 0 4px 12px rgba(201,164,94,0.30), 0 0 32px rgba(232,197,126,0.18); }\n.btn-gold:hover { background: var(--gold-hover); transform: translateY(-1px);\n  box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 6px 18px rgba(201,164,94,0.40), 0 0 40px rgba(232,197,126,0.28); }\n.btn-ghost-forest { background: transparent; color: var(--forest); border: 1px solid var(--forest); }\n.btn-ghost-forest:hover { background: var(--forest-soft); }\n.btn-ghost-gold { background: transparent; color: var(--gold); border: 1px solid var(--gold); }\n\n/* ---------- Cardly atmospheric system ---------- */\n/* Dotted-grid cream canvas — same vocabulary as the editor canvas */\n.dot-grid {\n  background-color: var(--cream-canvas);\n  background-image: radial-gradient(circle, rgba(15,31,24,0.045) 1px, transparent 1px);\n  background-size: 24px 24px; background-position: 0 0;\n}\n/* Mesh-gradient washes — atmospheric forest+gold blooms, never loud */\n.cardly-mesh { position: absolute; inset: -8%; pointer-events: none; z-index: 0; }\n.cardly-mesh-hero {\n  background:\n    radial-gradient(38% 32% at 18% 28%, rgba(31,77,58,0.32), transparent 62%),\n    radial-gradient(36% 32% at 82% 48%, rgba(232,197,126,0.34), transparent 62%),\n    radial-gradient(28% 26% at 60% 84%, rgba(31,77,58,0.16), transparent 65%);\n  filter: blur(90px);\n}\n.cardly-mesh-cta {\n  background:\n    radial-gradient(38% 32% at 28% 22%, rgba(31,77,58,0.32), transparent 60%),\n    radial-gradient(42% 36% at 76% 78%, rgba(232,197,126,0.38), transparent 60%),\n    radial-gradient(26% 26% at 52% 52%, rgba(232,197,126,0.20), transparent 60%);\n  filter: blur(95px);\n}\n/* Edge-lit gradient border on hover (forest → cream-gold) */\n.cardly-edge { position: relative; transition: box-shadow .25s ease, transform .25s ease; }\n.cardly-edge::before {\n  content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;\n  background: linear-gradient(135deg, #1F4D3A 0%, #2A6A50 45%, #E8C57E 100%);\n  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n  -webkit-mask-composite: xor; mask-composite: exclude;\n  opacity: 0; transition: opacity .25s ease; pointer-events: none;\n}\n.cardly-edge:hover::before { opacity: 1; }\n.cardly-edge:hover { box-shadow: 0 0 24px rgba(31,77,58,0.15), 0 10px 24px -12px rgba(31,77,58,0.22); transform: translateY(-1px); }\n/* Idle float for hero/cinematic cards */\n@keyframes heroFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }\n.hero-float { animation: heroFloat 4.5s ease-in-out infinite; }\n/* Section wash divider — soft transition between bands */\n.section-wash { height: 80px; pointer-events: none;\n  background: linear-gradient(to bottom, rgba(250,246,238,0) 0%, rgba(31,77,58,0.07) 50%, rgba(250,246,238,0) 100%); }\n\n/* ---------- Pills / badges ---------- */\n.pill { border-radius: var(--r-pill); display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--body); font-weight: 500; font-size: 12px; }\n\n/* scrollbar hide for horizontal rails */\n.no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }\n.no-scrollbar::-webkit-scrollbar { display: none; }\n\n/* status dot */\n.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }\n<\u002Fstyle>\n<style>/* KARTA — web shell (cream canvas). Loaded after karta.css on all 10 screens.\n   Everything is responsive: designed at 1440 desktop, reflows cleanly to 375. */\n\nhtml, body { color: var(--ink); }\n/* Cardly dotted-grid cream canvas — same vocabulary as the editor canvas */\nbody {\n  background-color: var(--cream-canvas);\n  background-image: radial-gradient(circle, rgba(15,31,24,0.045) 1px, transparent 1px);\n  background-size: 24px 24px; background-position: 0 0;\n}\n\n/* ---------- Public top nav (attendee pages W06–W10) ---------- */\n.topnav { height: 64px; background: rgba(250,246,238,0.85); backdrop-filter: blur(12px);\n  border-bottom: 1px solid var(--cream-border); position: sticky; top: 0; z-index: 50;\n  display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }\n.topnav .wm { font-family: var(--display); font-weight: 600; font-size: 19px; color: var(--forest); letter-spacing: -0.01em; }\n.topnav .wm b { color: var(--gold); }\n.topnav .links { display: flex; align-items: center; gap: 28px; }\n.topnav .links a { font-family: var(--body); font-size: 14px; font-weight: 500; color: var(--ink-soft); text-decoration: none; }\n.topnav .links a:hover { color: var(--forest); }\n.topnav .right { display: flex; align-items: center; gap: 16px; }\n\n/* ---------- Dashboard chrome (organizer W01–W05) ---------- */\n.dashnav { height: 64px; background: var(--cream-surface); border-bottom: 1px solid var(--cream-border);\n  display: flex; align-items: center; justify-content: space-between; padding: 0 28px; }\n.dashnav .crumb { font-family: var(--body); font-size: 14px; color: var(--ink-muted); }\n.dashnav .crumb b { color: var(--forest); font-weight: 600; font-family: var(--display); font-size: 18px; }\n.dash { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 64px); }\n.sidebar { padding: 24px 16px; border-right: 1px solid var(--cream-border); display: flex; flex-direction: column; }\n.side-label { font-family: var(--body); font-weight: 500; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); padding: 0 12px; margin: 8px 0 10px; }\n.side-item { height: 40px; display: flex; align-items: center; gap: 12px; padding: 0 12px; border-radius: var(--r-btn);\n  font-family: var(--display); font-size: 14px; font-weight: 400; color: var(--ink-soft); cursor: pointer; border-left: 2px solid transparent; }\n.side-item:hover { background: var(--cream-soft); }\n.side-item.active { background: var(--forest-soft); color: var(--forest); border-left: 2px solid var(--forest); font-weight: 500; }\n.side-item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.7; }\n.main { padding: 40px 48px; }\n\n/* ---------- Containers ---------- */\n.container { max-width: 1120px; margin: 0 auto; padding: 0 40px; }\n.container-narrow { max-width: 960px; margin: 0 auto; padding: 0 40px; }\n\n/* ---------- Cards / surfaces ---------- */\n.card { background: var(--cream-surface); border: 1px solid var(--cream-border); border-radius: var(--r-card); }\n.card-soft { background: var(--cream-soft); border: 1px solid var(--cream-border); border-radius: var(--r-card); }\n\n/* ---------- Tables (agents.md discipline — hairline only) ---------- */\n.tbl { width: 100%; border-collapse: collapse; }\n.tbl thead th { font-family: var(--body); font-weight: 500; font-size: 11px; letter-spacing: 0.06em;\n  text-transform: uppercase; color: var(--ink-muted); text-align: left; padding: 0 16px 12px; border-bottom: 1px solid var(--cream-border); }\n.tbl tbody td { padding: 14px 16px; border-bottom: 1px solid var(--cream-border); vertical-align: middle; }\n.tbl tbody tr:hover { background: var(--cream-soft); }\n.tbl tbody tr { cursor: pointer; }\n\n/* ---------- Status pills ---------- */\n.pill { border-radius: var(--r-pill); display: inline-flex; align-items: center; gap: 6px;\n  font-family: var(--body); font-weight: 500; font-size: 12px; padding: 5px 12px; }\n.pill-live { background: var(--forest-soft); color: var(--forest); }\n.pill-draft { background: var(--cream-soft); color: var(--ink-muted); }\n.pill-ended { background: transparent; border: 1px solid var(--cream-border); color: var(--ink-muted); }\n.pill-error { background: rgba(184,66,60,0.1); color: var(--error); }\n\n/* ---------- Filter chips ---------- */\n.chip { height: 34px; padding: 0 16px; display: inline-flex; align-items: center; border-radius: var(--r-pill);\n  font-family: var(--body); font-size: 13px; font-weight: 500; background: var(--cream-surface);\n  border: 1px solid var(--cream-border); color: var(--ink-muted); cursor: pointer; white-space: nowrap; transition: all .15s; }\n.chip.active { background: var(--forest); border-color: var(--forest); color: #fff; }\n\n/* ---------- Search bar (pill) ---------- */\n.search { height: 48px; border-radius: var(--r-pill); background: var(--cream-surface);\n  border: 1px solid var(--cream-border); display: flex; align-items: center; gap: 12px; padding: 0 20px; }\n.search:focus-within { border-color: var(--gold); }\n.search input { flex: 1; border: none; background: none; outline: none; font-family: var(--body); font-size: 15px; color: var(--ink); }\n.search input::placeholder { color: var(--ink-muted); }\n.search svg { width: 19px; height: 19px; stroke: var(--ink-muted); fill: none; stroke-width: 2; }\n\n/* ---------- Buttons (heights) ---------- */\n.btn-lg { height: 48px; padding: 0 24px; font-size: 15px; }\n.btn-md { height: 40px; padding: 0 18px; font-size: 14px; }\n.btn-sm { height: 34px; padding: 0 14px; font-size: 13px; }\n\n/* ---------- Avatar ring ---------- */\n.avatar { border-radius: 50%; flex: none; }\n.avatar-ring { box-shadow: 0 0 0 2px var(--forest-soft); }\n\n/* ---------- Section rhythm ---------- */\n.band { padding: 80px 0; }\n.band + .band { padding-top: 0; }\n\n/* ---------- Dotted leader (analytics revenue rows) ---------- */\n.leader { display: flex; align-items: baseline; gap: 10px; }\n.leader .lab { font-family: var(--body); font-size: 14px; color: var(--ink); }\n.leader .fill { flex: 1; border-bottom: 1px dotted var(--ink-muted); transform: translateY(-3px); opacity: .5; }\n.leader .amt { font-family: var(--mono); font-weight: 500; font-size: 16px; color: var(--forest); }\n\n/* ---------- Photo placeholder helpers reused from karta.css (.ph) ---------- */\n\n/* ---------- Mobile reflow ---------- */\n.menu-btn { display: none; width: 40px; height: 40px; border: 1px solid var(--cream-border); border-radius: var(--r-btn);\n  background: var(--cream-surface); align-items: center; justify-content: center; cursor: pointer; }\n.menu-btn svg { width: 20px; height: 20px; stroke: var(--forest); stroke-width: 2; }\n\n@media (max-width: 900px) {\n  .topnav { padding: 0 20px; }\n  .topnav .links { display: none; }\n  .menu-btn { display: flex; }\n  .dash { grid-template-columns: 1fr; }\n  .sidebar { display: none; }\n  .main { padding: 24px 20px; }\n  .container, .container-narrow { padding: 0 20px; }\n  .band { padding: 48px 0; }\n}\n<\u002Fstyle>\n<style>\n/* ─── RESET NAV WORDMARK ────────────────────────────── */\na.logo { text-decoration:none; display:inline-flex; align-items:center; gap:9px;\n  font-family:var(--display); font-weight:600; font-size:19px; color:var(--forest); letter-spacing:-0.01em; }\na.logo b { color:var(--gold); }\na.logo::before { content:''; width:24px; height:24px; border-radius:6px; flex:none;\n  background:linear-gradient(135deg,var(--forest) 0%,#2A6A50 55%,var(--gold) 135%); }\n\n/* ─── NAV — mobile first ────────────────────────────── */\n.topnav { height:56px; background:rgba(250,246,238,0.9); backdrop-filter:blur(12px);\n  border-bottom:1px solid var(--cream-border); position:sticky; top:0; z-index:50;\n  display:flex; align-items:center; justify-content:space-between; padding:0 20px; }\n.topnav .nav-links { display:none; }\n.topnav .nav-ctas  { display:none; }\n.topnav .menu-btn  { display:flex; }\n@media(min-width:900px){\n  .topnav { height:64px; padding:0 40px; }\n  .topnav .nav-links { display:flex; align-items:center; gap:28px; }\n  .topnav .nav-links a { font-family:var(--body); font-size:14px; font-weight:500; color:var(--ink-soft); text-decoration:none; transition:color .15s; }\n x; letter-spacing:.16em;\n  text-transform:uppercase; color:var(--ink-muted); margin-bottom:14px; }\n\n.sh { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:22px; }\n.sh h2 { font-family:var(--display); font-weight:400; font-size:clamp(20px,2.2vw,26px);\n  letter-spacing:-0.02em; color:var(--ink); white-space:nowrap; }\n.sh .s { font-family:var(--body); font-size:12px; color:var(--ink-muted); margin-top:5px; }\n.sh a { font-family:var(--body); font-size:13px; font-weight:500; color:var(--forest);\n  text-decoration:none; white-space:nowrap; flex:none; padding-top:4px; }\n\n/* ─── EVENT CARDS ───────────────────────────────────── */\n.evgrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }\n@media(min-width:900px)  { .evgrid { grid-template-columns:repeat(3,1fr); gap:16px; } }\n@media(min-width:1200px) { .evgrid { grid-template-columns:repeat(4,1fr); gap:18px; } }\n\n.ecard { border-radius:var(--r-card); overflow:hidden; background:var(--cream-surface);\n  border:1px solid var(--cream-border); text-decoration:none; display:block; }\n.ecard .img { aspect-ratio:3/2; position:relative; overflow:hidden; }\n.ecard .det { padding:11px 12px 14px; }\n.ecard .nm { font-family:var(--display); font-weight:500; font-size:13px; color:var(--ink); line-height:1.3; }\n.ecard .org { font-family:var(--body); font-size:11px; color:var(--ink-muted); margin-top:3px; }\n.ecard .foot { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }\n.ecard .date { font-family:var(--mono); font-size:11px; color:var(--ink-muted); }\n.ecard .price { font-family:var(--mono); font-weight:500; font-size:12px; }\n.ecard .price.free { color:var(--gold-hover); }\n.ecard .price.paid { color:var(--forest); }\n.ecard.hidden { display:none !important; }\n\n.imgtag { position:absolute; left:10px; top:10px; z-index:2; padding:4px 9px;\n  background:rgba(8,18,12,.44); backdrop-filter:blur(6px); color:#fff;\n  font-family:var(--body); font-weight:600; font-size:9px; letter-spacing:.09em;\n  text-transform:uppercase; border-radius:var(--r-pill); }\n.heart { position:absolute; top:10px; right:10px; width:28px; height:28px; border-radius:50%;\n  background:rgba(8,18,12,.35); backdrop-filter:blur(6px);\n  display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:2; }\n.heart svg { width:13px; height:13px; stroke:rgba(255,255,255,.9); fill:none; stroke-width:1.8; }\n.heart.saved svg { fill:var(--gold); stroke:var(--gold); }\n.going-b { position:absolute; right:10px; bottom:10px; z-index:2; padding:3px 8px;\n  background:rgba(8,18,12,.44); backdrop-filter:blur(6px);\n  color:rgba(255,255,255,.85); font-family:var(--mono); font-size:9px; border-radius:var(--r-pill); }\n.trend-b { position:absolute; left:10px; bottom:10px; z-index:2; padding:4px 9px;\n  background:rgba(250,246,238,.92); color:var(--forest);\n  font-family:var(--body); font-weight:500; font-size:9px; border-radius:var(--r-pill); }\n.trend-b b { font-family:var(--mono); }\n\n@media(min-width:640px){\n  .ecard .det { padding:13px 14px 16px; }\n  .ecard .nm { font-size:14px; }\n  .ecard .org { font-size:12px; }\n  .ecard .date,.ecard .price { font-size:12px; }\n}\n\n/* ─── THIS WEEKEND — dark strip ─────────────────────── */\n.wknd { background:var(--forest-dark); padding:52px 0; position:relative; overflow:hidden; }\n.wknd .cardly-mesh-cta { position:absolute; inset:-8%; z-index:0; }\n.wknd .pw,.wknd .sh { position:relative; z-index:1; }\n.wknd .sh h2 { color:#fff; }\n.wknd .sh .s { color:rgba(255,255,255,.45); }\n.wknd .sh a { color:var(--gold); }\n.wknd-scroll { display:flex; gap:12px; overflow-x:auto; padding-bottom:4px; position:relative; z-index:1; }\n.wcard { flex:none; width:min(280px,78vw); border-radius:var(--r-card); overflow:hidden;\n  background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);\n  text-decoration:none; display:block; transition:border-color .2s; }\n.wcard:hover { border-col u002Fdiv>\n  <div class=\"foot-bottom\">\n    <span class=\"copy\">© 2026 KARTA TECHNOLOGIES LTD<\u002Fspan>\n    <div class=\"legal\">\n      <a href=\"#\">Privacy<\u002Fa>\n      <a href=\"#\">Terms<\u002Fa>\n      <a href=\"#\">Cookies<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* ─── DATA ──────────────────────────────────────────── */\nconst EVENTS = [\n  { n:'AfriTech Summit 2026',       org:'Karta Studio',          cat:'Tech',      when:'12–14 Mar', city:'Djibouti City', price:'From $25', free:false, h:150, going:1284 },\n  { n:'Pan-African Climate Forum',  org:'GreenAfrica NGO',       cat:'NGO',       when:'22 Apr',    city:'Nairobi',       price:'Free',     free:true,  h:120, going:640  },\n  { n:'Founders Gala Dinner',       org:'Accelerate Africa',     cat:'Corporate', when:'14 May',    city:'Accra',         price:'$120',     free:false, h:210, going:320  },\n  { n:'Global Halal Summit',        org:'IFC Events',            cat:'Religious', when:'18 Jul',    city:'Istanbul',      price:'From $15', free:false, h:38,  going:880, trend:'+541 this wk' },\n  { n:'Dakar Art Biennale',         org:'Biennale Dakar',        cat:'Arts',      when:'03 Jun',    city:'Dakar',         price:'From $12', free:false, h:340, going:2100 },\n  { n:'UoN Class of 2026',          org:'Univ. of Nairobi',      cat:'Education', when:'Dec 2026',  city:'Nairobi',       price:'Invite',   free:false, h:155, going:612  },\n  { n:'Nairobi Tech Week',          org:'NaiTech Community',     cat:'Tech',      when:'08 Sep',    city:'Nairobi',       price:'From $20', free:false, h:158, going:3400, trend:'+1,204 this wk' },\n  { n:'Afrobeats Live',             org:'Concert Africa',        cat:'Music',     when:'21 Dec',    city:'Lagos',         price:'From $55', free:false, h:330, going:8800 },\n  { n:'Women in Leadership',        org:'Kigali Connect',        cat:'Corporate', when:'11 Mar',    city:'Kigali',        price:'From $60', free:false, h:265, going:540  },\n  { n:'Ramadan Charity Iftar',      org:'Cairo Relief',          cat:'Religious', when:'02 Apr',    city:'Cairo',         price:'Free',     free:true,  h:18,  going:1500 },\n  { n:'Addis Dev Meetup',           org:'Chewata Labs',          cat:'Tech',      when:'19 Mar',    city:'Addis Ababa',   price:'Free',     free:true,  h:95,  going:340  },\n  { n:'Sahara Rhythms Festival',    org:'Blue Note Productions', cat:'Music',     when:'30 May',    city:'Marrakesh',     price:'From $40', free:false, h:280, going:5200, trend:'+892 this wk' },\n];\n\nconst TRENDING = [\n  { n:'AfriTech Summit 2026',     org:'Karta Studio',            cat:'Tech',    when:'12–14 Mar', city:'Djibouti City', price:'From $25', momentum:94 },\n  { n:'Nairobi Tech Week',        org:'NaiTech Community',       cat:'Tech',    when:'08 Sep',    city:'Nairobi',       price:'From $20', momentum:78 },\n  { n:'Sahara Rhythms Festival',  org:'Blue Note Productions',   cat:'Music',   when:'30 May',    city:'Marrakesh',     price:'From $40', momentum:72 },\n  { n:'Lagos City Marathon',      org:'Lagos Sports Board',      cat:'Sports',  when:'09 Feb',    city:'Lagos',         price:'From $30', momentum:65 },\n  { n:'Global Halal Summit',      org:'IFC Events',              cat:'Religious',when:'18 Jul',   city:'Istanbul',      price:'From $15', momentum:58 },\n  { n:'Afrobeats Live',           org:'Concert Africa',          cat:'Music',   when:'21 Dec',    city:'Lagos',         price:'From $55', momentum:51 },\n];\n\nconst WKND = [\n  { n:'Sunset Sounds Festival',  org:'Blue Note DJ',   cat:'Music',    when:'Fri 14 Mar · 18:00', price:'Free',  h:18,  cd:'FRI' },\n  { n:'Founders Breakfast #14',  org:'Karta Studio',   cat:'Business', when:'Sat 15 Mar · 08:30', price:'$15',   h:265, cd:'SAT' },\n  { n:'Red Sea Food Fair',       org:'City Council',   cat:'Food',     when:'Sun 16 Mar · 11:00', price:'Free',  h:340, cd:'SUN' },\n  { n:'Coastal Run 10K',         org:'City Council',   cat:'Sports',   when:'Sun 16 Ma M12 21s-8-5.3-8-11a4.5 4.5 0 018-2.8A4.5 4.5 0 0120 10c0 5.7-8 11-8 11z\"/><\u002Fsvg><\u002Fdiv>\n      ${e.going ? `<span class=\"going-b\">${e.going.toLocaleString()} going<\u002Fspan>` : ''}\n      ${e.trend ? `<span class=\"trend-b\">↗ <b>${e.trend}<\u002Fb><\u002Fspan>` : ''}\n    <\u002Fdiv>\n    <div class=\"det\">\n      <div class=\"nm\">${e.n}<\u002Fdiv>\n      <div class=\"org\">${e.org} · ${e.city}<\u002Fdiv>\n      <div class=\"foot\"><span class=\"date\">${e.when}<\u002Fspan><span class=\"price ${e.free?'free':'paid'}\">${e.price}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fa>`;\n}\n\ndocument.getElementById('evgrid').innerHTML = EVENTS.map(mkEcard).join('');\n\ndocument.getElementById('wknd-scroll').innerHTML = WKND.map(e=>`\n  <a href=\"../attendee/att.html\" class=\"wcard\">\n    <div class=\"img ph\" style=\"--h:${e.h};\"><span class=\"imgtag\">${e.cat}<\u002Fspan><\u002Fdiv>\n    <div class=\"det\">\n      <div class=\"badge\"><span class=\"dot\"><\u002Fspan>${e.cd} · this weekend<\u002Fdiv>\n      <div class=\"nm\">${e.n}<\u002Fdiv>\n      <div class=\"mt\">${e.when}<\u002Fdiv>\n      <div class=\"pr\">${e.price}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fa>`).join('');\n\ndocument.getElementById('tr-list').innerHTML = TRENDING.map((e,i)=>`\n  <a class=\"tr-item\" href=\"../attendee/att.html\">\n    <div class=\"tr-rank ${i<3?'hot':''}\">${String(i+1).padStart(2,'0')}<\u002Fdiv>\n    <div class=\"tr-info\">\n      <div class=\"nm\">${e.n}<\u002Fdiv>\n      <div class=\"mt\"><span>${e.when}<\u002Fspan><span>${e.city}<\u002Fspan><span>${e.cat}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tr-right\">\n      <div class=\"tr-bar\"><div class=\"fill\" style=\"width:${e.momentum}%\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"tr-bar-label\">${e.momentum}% capacity<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tr-right tr-price\">${e.price}<\u002Fdiv>\n  <\u002Fa>`).join('');\n\ndocument.getElementById('fmtgrid').innerHTML = FMTS.map(f=>`\n  <div class=\"fcard\" onclick=\"filterCat('${f.cat}')\">\n    <div class=\"ico\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke-width=\"1.8\">${f.icon}<\u002Fsvg><\u002Fdiv>\n    <div class=\"n\">${f.n}<\u002Fdiv>\n    <div class=\"ct\">${f.ct}<\u002Fdiv>\n  <\u002Fdiv>`).join('');\n\ndocument.getElementById('orggrid').innerHTML = ORGS.map(o=>`\n  <div class=\"ocard cardly-edge\">\n    <div class=\"top\">\n      <div class=\"av ph\" style=\"--h:${o.h};\"><\u002Fdiv>\n      <div><div class=\"n\">${o.n}<\u002Fdiv><div class=\"loc\">${o.loc}<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stats\">\n      <div><div class=\"sv\">${o.fol}<\u002Fdiv><div class=\"sl\">Followers<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"sv\">${o.ev}<\u002Fdiv><div class=\"sl\">Events<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"sv\">${o.rt}<\u002Fdiv><div class=\"sl\">Rating<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"act\">\n      <button class=\"btn btn-forest btn-sm\" style=\"width:100%\"\n        onclick=\"event.stopPropagation();this.textContent=this.textContent==='Follow'?'✓ Following':'Follow'\">Follow<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>`).join('');\n\n/* ─── FILTER ────────────────────────────────────────── */\nlet activeCat = 'All';\n\ndocument.getElementById('chips').addEventListener('click', e => {\n  const c = e.target.closest('.hchip'); if(!c) return;\n  document.querySelector('.hchip.on')?.classList.remove('on'); c.classList.add('on');\n  activeCat = c.dataset.cat; applyFilters();\n});\n\nfunction filterCat(cat) {\n  activeCat = cat;\n  document.querySelector('.hchip.on')?.classList.remove('on');\n  document.querySelector(`.hchip[data-cat=\"${cat}\"]`)?.classList.add('on');\n  applyFilters();\n}\n\nfunction applyFilters() {\n  const q = document.getElementById('search-in').value.toLowerCase().trim();\n  let n = 0;\n  document.querySelectorAll('.ecard[data-cat]').forEach(c => {\n    const ok = (activeCat==='All' || c.dataset.cat===activeCat || (activeCat==='Free'&&c.dataset.free==='true'))\n              && (!q || c.dataset.name.includes(q));\n    c.classList.toggle('hidden', !ok);\n    if(ok) n++;\n  });\n  const label = (q||activeCat!=='All') ? `${n} event${n!==1?'s':''} matching` : `${EVENTS.length} events across Africa`;\n  document.getElementById('evt-count').textContent = label;\n  document.getElementById('fb-count').textContent = label;\n  document.getElementById('grid-title').textContent = activeCat==='All' ? 'Upcoming events' : `${activeCat} events`;\n}\n\n/* filter bar chips */\ndocument.querySelectorAll('.filterbar .chip').forEach(c => {\n  c.onclick = () => { document.querySelector('.filterbar .chip.active')?.classList.remove('active'); c.classList.add('active'); };\n});\n\n/* heart toggle */\ndocument.addEventListener('click', e => {\n  const h = e.target.closest('.heart');\n  if(h){ e.preventDefault(); e.stopPropagation(); h.classList.toggle('saved'); }\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
