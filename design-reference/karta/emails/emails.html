<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — Email Templates</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {
        colors: { primary: "#1F4D3A", "primary-dark": "#163828", "primary-soft": "#E8EFEB", accent: "#E8C57E", "accent-dark": "#C9A45E", ink: "#0F1F18", "ink-soft": "#3A4A42", muted: "#6B7A72", cream: "#FAF6EE", surface: "#FFFFFF", border: "#E5E0D4", success: "#2D7A4F", danger: "#B8423C" },
        fontFamily: { display: ['"DM Sans"', "sans-serif"], sans: ['"Inter"', "sans-serif"], mono: ['"JetBrains Mono"', "monospace"] },
      } } };
    </script>
    <style>
      html, body { color: #0F1F18; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #EFE9DC; overflow: hidden; }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }
      ::selection { background: #1F4D3A; color: #FAF6EE; }
      *:focus-visible { outline: 2px solid rgba(31,77,58,0.4); outline-offset: 2px; border-radius: 4px; }
      .e-scroll::-webkit-scrollbar { width: 8px; } .e-scroll::-webkit-scrollbar-thumb { background: rgba(15,31,24,0.14); border-radius: 6px; }
      .cardly-cta { box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.2); transition: transform .2s; }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel">
      const { useState } = React;

      function QR({ size = 86 }) {
        const n = 17, c = size / n, seed = (x, y) => ((x * 13 + y * 7 + x * y * 3) % 5) > 1;
        const dots = []; for (let y = 0; y < n; y++) for (let x = 0; x < n; x++) { const f = (x < 6 && y < 6) || (x > 10 && y < 6) || (x < 6 && y > 10); if (!f && seed(x, y)) dots.push(<rect key={x+'-'+y} x={x*c} y={y*c} width={c} height={c} fill="#0F1F18" />); }
        const fr = (gx, gy) => <g key={gx+'_'+gy}><rect x={gx*c} y={gy*c} width={c*6} height={c*6} fill="#0F1F18"/><rect x={(gx+1)*c} y={(gy+1)*c} width={c*4} height={c*4} fill="#fff"/><rect x={(gx+2)*c} y={(gy+2)*c} width={c*2} height={c*2} fill="#0F1F18"/></g>;
        return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><rect width={size} height={size} fill="#fff"/>{dots}{fr(0,0)}{fr(11,0)}{fr(0,11)}</svg>;
      }

      const ACCENT = { grad: "linear-gradient(135deg,#0D1F17,#1F4D3A 60%,#2A6A50)", ring: "#E8C57E" };

      const TEMPLATES = {
        confirm: { name: "Registration confirmation", auto: true, subject: "You're in! Your Africa Tech Festival pass 🎫", pre: "Everything you need for 12 Mar — plus your shareable card.", kicker: "You're registered", heading: "You're in, Aisha! 🎉", body: "Thanks for registering for Africa Tech Festival 2026. Your ticket and personalized Karta Card are ready below — we can't wait to see you in Djibouti.", ticket: true, card: true, agenda: false, cta: "View my ticket" },
        reminder: { name: "Event reminder", subject: "Africa Tech Festival starts in 3 days ⏳", pre: "Doors open 09:00. Here's how to make the most of it.", kicker: "3 days to go", heading: "Almost time, Aisha.", body: "Africa Tech Festival kicks off Thursday at the Djibouti Conference Centre. Save the sessions you don't want to miss and add the event to your calendar.", ticket: true, card: false, agenda: true, cta: "Add to calendar" },
        agenda: { name: "Agenda update", subject: "New sessions just dropped 📅", pre: "Fresh keynotes and workshops added to the programme.", kicker: "Programme update", heading: "Your agenda just got better.", body: "We've added new keynotes and hands-on workshops across all three tracks. Take a look and build your personal schedule.", ticket: false, card: false, agenda: true, cta: "Browse the agenda" },
        post: { name: "Post-event thank-you", subject: "That's a wrap — thank you 💚", pre: "Relive the highlights and keep the connections going.", kicker: "Until next time", heading: "Thank you for joining us.", body: "Africa Tech Festival 2026 was unforgettable — and you were part of it. Your connections and session recordings are saved to your account. Share your card one more time?", ticket: false, card: true, agenda: false, cta: "See highlights" },
        ticket: { name: "Ticket delivery", subject: "Your ticket for Africa Tech Festival", pre: "Scan this QR at the door for fast check-in.", kicker: "Your pass", heading: "Here's your ticket.", body: "Show this QR code at the entrance for contactless check-in. You can also add it to Apple or Google Wallet.", ticket: true, card: false, agenda: false, cta: "Add to wallet" },
      };
      const ORDER = ["confirm", "reminder", "agenda", "post", "ticket"];

      function EmailPreview({ t, device }) {
        const w = device === "mobile" ? 380 : 600;
        return (
          <div className="mx-auto bg-white rounded-2xl overflow-hidden border border-border" style={{ width: w, boxShadow: "0 30px 70px -30px rgba(15,31,24,0.4)" }}>
            {/* header band */}
            <div className="relative px-7 py-6" style={{ background: ACCENT.grad }}>
              <div aria-hidden className="absolute inset-0" style={{ background: "radial-gradient(70% 90% at 90% 0%, rgba(232,197,126,0.3), transparent 60%)" }} />
              <div className="relative flex items-center gap-2">
                <span className="w-6 h-6 rounded-md" style={{ background: "linear-gradient(135deg,#FAF6EE,#E8C57E)" }} />
                <span className="font-display text-cream text-[16px] font-bold tracking-tight">Karta</span>
                <span className="ml-auto font-mono text-[9px] tracking-[0.16em] uppercase text-accent">Africa Tech Fest</span>
              </div>
            </div>
            {/* body */}
            <div className="px-7 py-7">
              <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-accent-dark">{t.kicker}</div>
              <h1 className="font-display text-[24px] font-bold text-primary tracking-[-0.02em] mt-2 leading-tight">{t.heading}</h1>
              <p className="text-[14px] text-ink-soft leading-[1.65] mt-3">{t.body}</p>

              {t.ticket && (
                <div className="mt-5 rounded-2xl border border-border overflow-hidden">
                  <div className="px-5 py-3 bg-cream border-b border-border flex items-center justify-between"><span className="font-display text-[13.5px] font-semibold text-ink">Africa Tech Festival 2026</span><span className="font-mono text-[10px] text-muted">#AT-198</span></div>
                  <div className="p-5 flex items-center gap-5">
                    <div className="border border-border rounded-lg p-1.5 bg-white"><QR size={86} /></div>
                    <div className="grid gap-2 text-[12.5px]">
                      <div><span className="font-mono text-[8.5px] tracking-[0.14em] uppercase text-muted block">When</span>12–14 Mar 2026 · 09:00</div>
                      <div><span className="font-mono text-[8.5px] tracking-[0.14em] uppercase text-muted block">Where</span>Djibouti Conference Centre</div>
                      <div><span className="font-mono text-[8.5px] tracking-[0.14em] uppercase text-muted block">Ticket</span>VIP · Admit one</div>
                    </div>
                  </div>
                </div>
              )}

              {t.card && (
                <div className="mt-5 rounded-2xl p-5 flex items-center gap-4" style={{ background: "linear-gradient(135deg, rgba(232,197,126,0.16), rgba(31,77,58,0.06))", border: "1px solid rgba(232,197,126,0.4)" }}>
                  <div className="rounded-lg overflow-hidden shrink-0" style={{ width: 70, height: 98, background: ACCENT.grad, boxShadow: "0 8px 20px -8px rgba(13,31,23,0.5)" }}>
                    <div className="h-full flex flex-col items-center justify-center px-2 text-center"><div className="w-7 h-7 rounded-full mb-1.5" style={{ border: "1.5px solid #E8C57E", background: "linear-gradient(135deg,#C9A45E,#1F4D3A)" }} /><div className="text-cream font-display font-semibold" style={{ fontSize: 8 }}>Aisha A.</div><div className="text-accent font-mono mt-0.5" style={{ fontSize: 5.5 }}>VIP · 12 MAR</div></div>
                  </div>
                  <div className="min-w-0">
                    <div className="font-display text-[14px] font-semibold text-primary-dark">Your Karta Card is ready</div>
                    <div className="text-[12.5px] text-ink-soft mt-0.5 leading-snug">Share it on social — every post brings more people to the event.</div>
                    <div className="inline-flex items-center gap-1.5 mt-2.5 bg-accent text-primary-dark rounded-full px-3 py-1.5 text-[11px] font-semibold"><Icon.Share w={12} /> Share my card</div>
                  </div>
                </div>
              )}

              {t.agenda && (
                <div className="mt-5">
                  <div className="font-mono text-[8.5px] tracking-[0.16em] uppercase text-muted mb-2.5">Agenda highlights</div>
                  <div className="grid gap-2">
                    {[["09:30", "Opening keynote", "#1F4D3A"], ["11:00", "Scaling fintech in Africa", "#2A6A50"], ["14:00", "Founder networking", "#C9A45E"]].map((r, i) => (
                      <div key={i} className="flex items-center gap-3 bg-cream/60 border border-border rounded-lg px-3.5 py-2.5"><span className="font-mono text-[11px] text-muted w-9">{r[0]}</span><span className="w-1.5 h-1.5 rounded-full" style={{ background: r[2] }} /><span className="text-[13px] text-ink">{r[1]}</span></div>
                    ))}
                  </div>
                </div>
              )}

              <a href="#" onClick={(e) => e.preventDefault()} className="cardly-cta mt-6 inline-flex w-full items-center justify-center gap-2 px-5 py-3 rounded-xl bg-primary text-cream font-medium text-[14px]">{t.cta} <Icon.Arrow w={15} /></a>
            </div>
            {/* footer */}
            <div className="px-7 py-5 border-t border-border bg-cream/50 text-center">
              <div className="font-mono text-[10px] tracking-[0.12em] uppercase text-muted">Made with Karta</div>
              <div className="text-[11px] text-muted/80 mt-1.5">Sahel Ventures · Djibouti City · <a className="underline">Unsubscribe</a> · <a className="underline">Manage preferences</a></div>
            </div>
          </div>
        );
      }

      function Tgl({ on, onClick }) { return <button onClick={onClick} className={`relative w-9 h-5 rounded-full transition-colors shrink-0 ${on ? "bg-primary" : "bg-ink/15"}`}><span className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow transition-all ${on ? "left-[18px]" : "left-0.5"}`} /></button>; }
      function EField({ label, value }) { return <label className="block"><span className="font-mono text-[9.5px] tracking-[0.14em] uppercase text-muted block mb-1.5">{label}</span><input defaultValue={value} className="w-full bg-cream border border-border rounded-lg px-3 py-2 text-[13px] text-ink focus:border-accent outline-none" /></label>; }

      function App() {
        const [tplId, setTplId] = useState("confirm");
        const [device, setDevice] = useState("desktop");
        const [blocks, setBlocks] = useState({ ticket: true, card: true, agenda: true });
        const base = TEMPLATES[tplId];
        const t = { ...base, ticket: base.ticket && blocks.ticket, card: base.card && blocks.card, agenda: base.agenda && blocks.agenda };
        const palette = [["Header", "Layout"], ["Text", "Tag"], ["Button", "Bolt"], ["Ticket + QR", "Ticket"], ["Karta Card", "IdCard"], ["Agenda", "Grid"], ["Divider", "ChevDown"], ["Footer", "Layout"]];

        return (
          <div className="h-screen flex flex-col bg-cream text-ink overflow-hidden">
            {/* top bar */}
            <header className="h-12 shrink-0 bg-primary-dark text-cream flex items-center justify-between px-3">
              <div className="flex items-center gap-3 min-w-0">
                <button className="w-8 h-8 grid place-items-center rounded-lg hover:bg-cream/10"><Icon.ChevLeft w={18} /></button>
                <span className="w-7 h-7 rounded-md grid place-items-center font-display font-bold text-[13px] text-primary-dark" style={{ background: "linear-gradient(135deg,#FAF6EE,#E8C57E)" }}>K</span>
                <div className="text-[13px] flex items-center gap-2 min-w-0"><span className="text-cream/55 hidden sm:inline">Communications</span><span className="text-cream/30 hidden sm:inline">/</span><span className="font-medium truncate">Email templates</span></div>
              </div>
              <div className="flex items-center gap-2">
                <div className="hidden sm:flex items-center bg-cream/10 border border-cream/15 rounded-lg p-0.5">
                  {[["desktop", "Eye"], ["mobile", "Layout"]].map(([d, ic]) => { const IconC = Icon[ic]; return <button key={d} onClick={() => setDevice(d)} className={`px-2.5 py-1 rounded-md ${device === d ? "bg-cream text-primary-dark" : "text-cream/70"}`}><IconC w={14} /></button>; })}
                </div>
                <button className="hidden sm:inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-cream/10 border border-cream/15 text-[12.5px] font-medium"><Icon.Bell w={14} /> Send test</button>
                <button className="inline-flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg bg-accent text-primary-dark text-[12.5px] font-semibold hover:bg-accent-dark"><Icon.Check w={14} /> Save</button>
              </div>
            </header>

            <div className="flex-1 flex overflow-hidden">
              {/* left: templates + blocks */}
              <div className="w-[252px] shrink-0 bg-surface border-r border-border overflow-y-auto e-scroll hidden md:block">
                <div className="p-3">
                  <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-muted mb-2">Templates</div>
                  <div className="grid gap-1">
                    {ORDER.map((id) => { const tp = TEMPLATES[id]; const on = tplId === id; return (
                      <button key={id} onClick={() => setTplId(id)} className={`flex items-center gap-2.5 px-2.5 py-2 rounded-lg text-left transition-colors ${on ? "bg-primary text-cream" : "hover:bg-cream text-ink-soft"}`}>
                        <span className={`w-7 h-7 rounded-lg grid place-items-center shrink-0 ${on ? "bg-cream/15 text-cream" : "bg-primary-soft text-primary"}`}><Icon.Bell w={13} /></span>
                        <span className="flex-1 min-w-0"><span className={`block text-[12.5px] font-medium leading-tight ${on ? "text-cream" : "text-ink"}`}>{tp.name}</span></span>
                        {tp.auto && <span className={`font-mono text-[8px] tracking-[0.1em] uppercase px-1.5 py-0.5 rounded ${on ? "bg-accent text-primary-dark" : "bg-accent/20 text-accent-dark"}`}>Auto</span>}
                      </button>
                    ); })}
                  </div>
                </div>
                <div className="p-3 border-t border-border/70">
                  <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-muted mb-2">Add block</div>
                  <div className="grid grid-cols-2 gap-1.5">
                    {palette.map(([label, ic]) => { const IconC = Icon[ic] || Icon.Tag; return (
                      <button key={label} className="flex items-center gap-2 px-2.5 py-2 rounded-lg border border-border bg-cream/40 hover:border-primary/40 hover:bg-primary-soft/40 transition-colors text-left"><IconC w={13} className="text-primary shrink-0" /><span className="text-[11px] font-medium text-ink-soft truncate">{label}</span></button>
                    ); })}
                  </div>
                </div>
              </div>

              {/* center: preview */}
              <div className="flex-1 overflow-y-auto e-scroll p-6 lg:p-10" style={{ background: "#E6E0D2" }}>
                {/* mail meta */}
                <div className="mx-auto mb-5" style={{ maxWidth: device === "mobile" ? 380 : 600 }}>
                  <div className="bg-surface/80 border border-border rounded-xl px-4 py-3 text-[12.5px]">
                    <div className="flex items-center gap-2 pb-2 border-b border-border/60"><span className="font-mono text-[9px] tracking-[0.14em] uppercase text-muted w-12">From</span><span className="text-ink">Karta · Sahel Ventures &lt;events@sahel.karta.app&gt;</span></div>
                    <div className="flex items-center gap-2 py-2 border-b border-border/60"><span className="font-mono text-[9px] tracking-[0.14em] uppercase text-muted w-12">Subj</span><span className="text-ink font-medium">{base.subject}</span></div>
                    <div className="flex items-center gap-2 pt-2"><span className="font-mono text-[9px] tracking-[0.14em] uppercase text-muted w-12">Preview</span><span className="text-muted truncate">{base.pre}</span></div>
                  </div>
                </div>
                <EmailPreview t={t} device={device} />
              </div>

              {/* right: settings */}
              <div className="w-[300px] shrink-0 bg-surface border-l border-border overflow-y-auto e-scroll hidden lg:block">
                <div className="p-4 border-b border-border/70">
                  <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-muted mb-3">Email settings</div>
                  <div className="grid gap-3.5">
                    <EField label="Subject line" value={base.subject} />
                    <EField label="Preheader" value={base.pre} />
                    <EField label="From name" value="Karta · Sahel Ventures" />
                    <EField label="Reply-to" value="events@sahel.karta.app" />
                  </div>
                </div>
                <div className="p-4 border-b border-border/70">
                  <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-muted mb-3">Content blocks</div>
                  <div className="grid gap-2.5">
                    {[["ticket", "Ticket + QR", base.ticket], ["card", "Karta Card", base.card], ["agenda", "Agenda highlights", base.agenda]].map(([k, label, avail]) => (
                      <div key={k} className={`flex items-center justify-between ${avail ? "" : "opacity-40"}`}>
                        <span className="text-[13px] text-ink-soft">{label}</span>
                        <Tgl on={avail && blocks[k]} onClick={() => avail && setBlocks({ ...blocks, [k]: !blocks[k] })} />
                      </div>
                    ))}
                  </div>
                </div>
                <div className="p-4">
                  <div className="font-mono text-[9.5px] tracking-[0.18em] uppercase text-muted mb-3">Automation</div>
                  <div className="rounded-xl p-3 text-[12px] text-ink-soft leading-snug bg-primary-soft/50 border border-primary/15">
                    {base.auto ? "Sent automatically the moment someone registers." : "Send manually, or schedule to your attendee list."}
                  </div>
                  <div className="flex items-center justify-between mt-3"><span className="text-[13px] text-ink-soft">Include Karta Card</span><Tgl on={blocks.card} onClick={() => setBlocks({ ...blocks, card: !blocks.card })} /></div>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
