<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — The event platform that makes every attendee want to share</title>
    <meta name="description" content="Karta is a complete event management platform: registration, tickets, agenda, speaker directory, QR check-in, attendee networking and analytics — and the only platform where every registrant automatically gets a personalized card to share." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Karta — The complete event platform" />
    <meta property="og:description" content="Registration, agenda, check-in, networking — and the only event platform where every attendee leaves with a personalized card to post." />
    <meta property="og:site_name" content="Karta" />
    <meta property="og:url" content="https://karta.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Karta — The complete event platform" />
    <meta name="twitter:description" content="The event platform that makes every attendee want to share." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1F4D3A",
              "primary-dark": "#163828",
              "primary-soft": "#E8EFEB",
              accent: "#E8C57E",
              "accent-dark": "#C9A45E",
              ink: "#0F1F18",
              "ink-soft": "#3A4A42",
              muted: "#6B7A72",
              cream: "#FAF6EE",
              surface: "#FFFFFF",
              border: "#E5E0D4",
              success: "#2D7A4F",
              danger: "#B8423C",
            },
            fontFamily: {
              display: ['"DM Sans"', "sans-serif"],
              sans: ['"Inter"', "sans-serif"],
              mono: ['"JetBrains Mono"', "monospace"],
            },
          },
        },
      };
    </script>

    <style>
      html, body {
        color: #0F1F18;
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Subtle dotted grid as the page background — same vocabulary as the editor canvas */
      body {
        background-color: #FAF6EE;
        background-image: radial-gradient(circle, rgba(15, 31, 24, 0.045) 1px, transparent 1px);
        background-size: 24px 24px;
        background-position: 0 0;
      }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.03em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }

      /* Tweakable editorial titles — bold + big by default */
      :root {
        --title-weight: 700;
        --title-scale: 1;
        --title-tracking: -0.04em;
      }

      ::selection { background: #1F4D3A; color: #FAF6EE; }

      /* Hero card subtle idle float */
      @keyframes heroFloat {
        0%, 100% { transform: translateY(0px) rotate(-3deg); }
        50%      { transform: translateY(-6px) rotate(-3deg); }
      }
      .hero-float { animation: heroFloat 4.5s ease-in-out infinite; }
      @keyframes heroFloatSoft {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-7px); }
      }
      .hero-float-soft { animation: heroFloatSoft 5s ease-in-out infinite; }
      @media (prefers-reduced-motion: reduce) {
        .hero-float, .hero-float-soft { animation: none; }
      }

      /* ─────────────────────────────────────────────────────────── */
      /* Mesh-gradient washes — atmospheric, never loud                */
      /* ─────────────────────────────────────────────────────────── */
      .cardly-mesh { position: absolute; inset: -8%; pointer-events: none; z-index: 0; }
      .cardly-mesh-hero {
        background:
          radial-gradient(38% 32% at 18% 28%, rgba(31, 77, 58, 0.32), transparent 62%),
          radial-gradient(36% 32% at 82% 48%, rgba(232, 197, 126, 0.34), transparent 62%),
          radial-gradient(28% 26% at 60% 84%, rgba(31, 77, 58, 0.16), transparent 65%);
        filter: blur(90px);
      }
      .cardly-mesh-solution {
        background:
          radial-gradient(36% 32% at 12% 22%, rgba(31, 77, 58, 0.25), transparent 60%),
          radial-gradient(32% 26% at 88% 70%, rgba(232, 197, 126, 0.28), transparent 60%),
          radial-gradient(28% 24% at 65% 30%, rgba(31, 77, 58, 0.12), transparent 60%);
        filter: blur(100px);
      }
      .cardly-mesh-cta {
        background:
          radial-gradient(38% 32% at 28% 22%, rgba(31, 77, 58, 0.32), transparent 60%),
          radial-gradient(42% 36% at 76% 78%, rgba(232, 197, 126, 0.38), transparent 60%),
          radial-gradient(26% 26% at 52% 52%, rgba(232, 197, 126, 0.20), transparent 60%);
        filter: blur(95px);
      }

      /* ─────────────────────────────────────────────────────────── */
      /* Confident CTA — multi-layer shadow, present without shouting */
      /* ─────────────────────────────────────────────────────────── */
      .cardly-cta {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.15),
          0 4px 12px rgba(31, 77, 58, 0.25),
          0 0 32px rgba(31, 77, 58, 0.12);
        transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease;
      }
      .cardly-cta:hover {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.22),
          0 6px 18px rgba(31, 77, 58, 0.32),
          0 0 40px rgba(31, 77, 58, 0.20);
      }
      .cardly-cta-accent {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.35),
          0 4px 12px rgba(201, 164, 94, 0.30),
          0 0 32px rgba(232, 197, 126, 0.20);
      }
      .cardly-cta-accent:hover {
        transform: translateY(-1px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.45),
          0 6px 18px rgba(201, 164, 94, 0.40),
          0 0 40px rgba(232, 197, 126, 0.30);
      }

      /* ─────────────────────────────────────────────────────────── */
      /* Edge-lit gradient border on hover (forest → cream-gold)      */
      /* ─────────────────────────────────────────────────────────── */
      .cardly-edge {
        position: relative;
        transition: box-shadow .25s ease, transform .25s ease;
      }
      .cardly-edge::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(135deg, #1F4D3A 0%, #2A6A50 45%, #E8C57E 100%);
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
                mask-composite: exclude;
        opacity: 0;
        transition: opacity .25s ease;
        pointer-events: none;
      }
      .cardly-edge:hover::before { opacity: 1; }
      .cardly-edge:hover {
        box-shadow:
          0 0 24px rgba(31, 77, 58, 0.15),
          0 10px 24px -12px rgba(31, 77, 58, 0.22);
        transform: translateY(-1px);
      }
      /* On dark surfaces (feature cards) — lighter gradient that reads */
      .cardly-edge-on-dark::before {
        background: linear-gradient(135deg, rgba(232, 197, 126, 0.35) 0%, #E8C57E 50%, rgba(250, 246, 238, 0.6) 100%);
      }
      .cardly-edge-on-dark:hover {
        box-shadow:
          0 0 28px rgba(232, 197, 126, 0.18),
          0 8px 22px -10px rgba(232, 197, 126, 0.18);
      }

      /* ─────────────────────────────────────────────────────────── */
      /* Hero card halo                                                */
      /* ─────────────────────────────────────────────────────────── */
      .hero-card-halo {
        position: absolute;
        inset: -22%;
        background:
          radial-gradient(50% 50% at 50% 50%, rgba(31, 77, 58, 0.40), transparent 60%),
          radial-gradient(44% 44% at 62% 58%, rgba(232, 197, 126, 0.32), transparent 65%);
        filter: blur(40px);
        opacity: 0.9;
        pointer-events: none;
        z-index: 0;
      }

      /* ─────────────────────────────────────────────────────────── */
      /* Section wash divider — soft transition between sections      */
      /* ─────────────────────────────────────────────────────────── */
      .section-wash {
        height: 80px;
        background: linear-gradient(to bottom,
          rgba(250, 246, 238, 0) 0%,
          rgba(31, 77, 58, 0.07) 50%,
          rgba(250, 246, 238, 0) 100%);
        pointer-events: none;
      }
      .section-wash-on-dark {
        background: linear-gradient(to bottom,
          rgba(22, 56, 40, 0) 0%,
          rgba(232, 197, 126, 0.08) 50%,
          rgba(22, 56, 40, 0) 100%);
      }

      /* Focus rings */
      *:focus-visible {
        outline: 3px solid rgba(31, 77, 58, 0.35);
        outline-offset: 2px;
        border-radius: 4px;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"

</html>
