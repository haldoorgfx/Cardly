<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — Get started</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {
        colors: { primary: "#1F4D3A", "primary-dark": "#163828", "primary-soft": "#E8EFEB", accent: "#E8C57E", "accent-dark": "#C9A45E", ink: "#0F1F18", "ink-soft": "#3A4A42", muted: "#6B7A72", cream: "#FAF6EE", surface: "#FFFFFF", border: "#E5E0D4", success: "#2D7A4F", danger: "#B8423C" },
        fontFamily: { display: ['"DM Sans"', "sans-serif"], sans: ['"Inter"', "sans-serif"], mono: ['"JetBrains Mono"', "monospace"] },
      } } };
    </script>
    <style>
      html, body { color: #0F1F18; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #EFE9DC; }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }
      ::selection { background: #1F4D3A; color: #FAF6EE; }
      *:focus-visible { outline: 2px solid rgba(31,77,58,0.4); outline-offset: 2px; border-radius: 4px; }
      .ob-scroll::-webkit-scrollbar { width: 7px; } .ob-scroll::-webkit-scrollbar-thumb { background: rgba(15,31,24,0.14); border-radius: 6px; }
      .cardly-cta { box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.2); transition: transform .2s, box-shadow .2s; }
      .cardly-cta:hover { transform: translateY(-1px); }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel">
      const { useState } = React;
      const STEPS = ["Welcome", "Organization", "Brand", "First event", "Invite team", "Done"];
      const ACCENTS = [
        { id: "gold", label: "Forest & Gold", grad: "linear-gradient(155deg,#0D1F17,#1F4D3A 70%,#163828)", ring: "#E8C57E" },
        { id: "plum", label: "Plum", grad: "linear-gradient(155deg,#14101f,#3a2a55 75%,#241733)", ring: "#C9A45E" },
        { id: "clay", label: "Clay", grad: "linear-gradient(155deg,#1f120c,#5a3320 75%,#2b160c)", ring: "#E8C57E" },
        { id: "ocean", label: "Ocean", grad: "linear-gradient(155deg,#0c1420,#1e3a55 75%,#0b1a26)", ring: "#E8C57E" },
      ];

      function MiniCard({ accent, name = "Your Name", role = "Attendee", w = 150 }) {
        const h = w * 1.4;
        return (
          <div className="rounded-[12px] overflow-hidden relative" style={{ width: w, height: h, background: accent.grad, boxShadow: "0 18px 40px -16px rgba(13,31,23,0.55)" }}>
            <div aria-hidden className="absolute inset-0" style={{ background: "radial-gradient(60% 45% at 50% 40%, rgba(232,197,126,0.2), transparent 65%)" }} />
            <div className="relative h-full flex flex-col" style={{ padding: w * 0.085 }}>
              <div className="flex items-center justify-between"><span className="font-display font-semibold" style={{ color: accent.ring, fontSize: w * 0.045 }}>Africa Tech Fest</span><span className="font-mono" style={{ color: "rgba(255,255,255,0.6)", fontSize: w * 0.037 }}>2026</span></div>
              <div className="rounded-full mx-auto mt-auto grid place-items-center text-white font-display font-semibold" style={{ width: w * 0.36, height: w * 0.36, border: `2px solid ${accent.ring}`, background: "linear-gradient(135deg,#C9A45E,#1F4D3A)", fontSize: w * 0.11 }}>AO</div>
              <div className="text-center text-white font-display font-medium mt-3" style={{ fontSize: w * 0.085 }}>{name}</div>
              <div className="text-center" style={{ color: "rgba(255,255,255,0.7)", fontSize: w * 0.045, marginTop: 2 }}>{role}</div>
              <div className="flex items-center justify-between mt-auto" style={{ paddingTop: w * 0.05, borderTop: `1px solid ${accent.ring}40` }}><span className="font-mono" style={{ color: accent.ring, fontSize: w * 0.04 }}>VIP</span><span className="font-mono" style={{ color: "rgba(255,255,255,0.6)", fontSize: w * 0.04 }}>12 MAR</span></div>
            </div>
          </div>
        );
      }

      function Field({ label, value, placeholder, half }) {
        return (
          <label className={`block ${half ? "" : ""}`}>
            <span className="font-mono text-[9.5px] tracking-[0.14em] uppercase text-muted block mb-1.5">{label}</span>
            <input defaultValue={value} placeholder={placeholder} className="w-full bg-surface border border-border rounded-xl px-3.5 py-3 text-[14.5px] text-ink placeholder:text-muted/60 focus:border-accent outline-none transition-colors" />
          </label>
        );
      }

      function App() {
        const [step, setStep] = useState(0);
        const [evType, setEvType] = useState("tech");
        const [accent, setAccent] = useState(ACCENTS[0]);
        const types = [["tech", "Tech conference", "Grid"], ["festival", "Festival / concert", "Sparkle"], ["corporate", "Corporate / brand", "Briefcase"], ["ngo", "NGO / community", "Network"], ["religious", "Religious", "Calendar"], ["other", "Something else", "Bolt"]];
        const next = () => setStep(Math.min(STEPS.length - 1, step + 1));
        const back = () => setStep(Math.max(0, step - 1));

        return (
          <div className="min-h-screen grid lg:grid-cols-[300px_1fr]">
            {/* Left progress panel */}
            <div className="hidden lg:flex flex-col px-8 py-8 text-cream relative overflow-hidden" style={{ background: "linear-gradient(165deg,#0D1F17,#1F4D3A 65%,#235741)" }}>
              <div aria-hidden className="absolute inset-0" style={{ background: "radial-gradient(50% 40% at 80% 12%, rgba(232,197,126,0.22), transparent 60%)" }} />
              <div className="relative flex items-center gap-2.5 mb-12">
                <span className="w-8 h-8 rounded-lg" style={{ background: "linear-gradient(135deg,#FAF6EE,#E8C57E)" }} />
                <span className="font-display text-[20px] font-bold tracking-tight">Karta</span>
              </div>
              <div className="relative flex-1">
                <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-accent/80 mb-5">Get set up</div>
                <div className="grid gap-1">
                  {STEPS.slice(0, 5).map((s, i) => {
                    const done = i < step, active = i === step;
                    return (
                      <div key={i} className="flex items-center gap-3 py-2">
                        <span className={`w-6 h-6 rounded-full grid place-items-center font-mono text-[11px] shrink-0 ${done ? "bg-accent text-primary-dark" : active ? "bg-cream text-primary-dark" : "bg-cream/10 text-cream/50 border border-cream/20"}`}>{done ? "✓" : i + 1}</span>
                        <span className={`text-[13.5px] ${active ? "text-cream font-medium" : done ? "text-cream/70" : "text-cream/45"}`}>{s}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="relative text-[12.5px] text-cream/55 leading-relaxed">Takes about 2 minutes. You can change anything later.</div>
            </div>

            {/* Right content */}
            <div className="flex flex-col min-h-screen">
              <div className="lg:hidden h-1.5 bg-border"><div className="h-full bg-primary transition-all" style={{ width: `${(step / (STEPS.length - 1)) * 100}%` }} /></div>
              <div className="flex-1 overflow-y-auto ob-scroll">
                <div className="max-w-[560px] mx-auto px-6 sm:px-10 py-10 lg:py-16">
                  {step === 0 && (
                    <div>
                      <h1 className="font-display text-[30px] font-semibold text-primary tracking-[-0.025em]">Welcome to Karta 👋</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6]">Let's tailor your workspace. What kind of events do you run?</p>
                      <div className="mt-7 grid grid-cols-2 gap-3">
                        {types.map(([id, label, icon]) => {
                          const IconC = Icon[icon] || Icon.Grid; const on = evType === id;
                          return (
                            <button key={id} onClick={() => setEvType(id)} className={`flex items-center gap-3 text-left rounded-2xl border p-4 transition-all ${on ? "border-primary bg-primary-soft/50 ring-1 ring-primary/30" : "border-border bg-surface hover:border-primary/40"}`}>
                              <span className={`w-9 h-9 rounded-xl grid place-items-center shrink-0 ${on ? "bg-primary text-cream" : "bg-primary-soft text-primary"}`}><IconC w={17} /></span>
                              <span className="text-[13px] font-medium text-ink leading-tight">{label}</span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {step === 1 && (
                    <div>
                      <h1 className="font-display text-[28px] font-semibold text-primary tracking-[-0.025em]">Set up your organization</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6]">This is the brand attendees will see across your events.</p>
                      <div className="mt-7 grid gap-4">
                        <div className="flex items-center gap-4">
                          <span className="w-16 h-16 rounded-2xl border border-dashed border-primary/40 bg-surface grid place-items-center text-primary shrink-0"><Icon.Plus w={20} /></span>
                          <div><div className="text-[13.5px] font-medium text-ink">Organization logo</div><div className="text-[12px] text-muted mt-0.5">PNG or SVG, square works best</div></div>
                        </div>
                        <Field label="Organization name" value="Sahel Ventures" />
                        <div className="grid grid-cols-2 gap-4">
                          <Field label="Region" value="East Africa" />
                          <Field label="Currency" value="USD · $" />
                        </div>
                      </div>
                    </div>
                  )}
                  {step === 2 && (
                    <div>
                      <h1 className="font-display text-[28px] font-semibold text-primary tracking-[-0.025em]">Pick your brand look</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6]">This styles your event pages and the Karta Card every attendee shares.</p>
                      <div className="mt-7 grid sm:grid-cols-[1fr_180px] gap-6 items-start">
                        <div className="grid gap-2.5">
                          {ACCENTS.map((a) => (
                            <button key={a.id} onClick={() => setAccent(a)} className={`flex items-center gap-3 rounded-2xl border p-3 transition-all ${accent.id === a.id ? "border-primary ring-1 ring-primary/30" : "border-border hover:border-primary/40"}`}>
                              <span className="w-10 h-10 rounded-xl shrink-0" style={{ background: a.grad }} />
                              <span className="text-[13.5px] font-medium text-ink">{a.label}</span>
                              {accent.id === a.id && <span className="ml-auto text-primary"><Icon.Check w={16} /></span>}
                            </button>
                          ))}
                        </div>
                        <div className="hidden sm:flex justify-center"><MiniCard accent={accent} name="Adaeze O." role="Founder · Sahel" w={168} /></div>
                      </div>
                    </div>
                  )}
                  {step === 3 && (
                    <div>
                      <h1 className="font-display text-[28px] font-semibold text-primary tracking-[-0.025em]">Create your first event</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6]">Just the essentials — you can flesh it out in the dashboard.</p>
                      <div className="mt-7 grid gap-4">
                        <Field label="Event name" value="Africa Tech Festival 2026" />
                        <div className="grid grid-cols-2 gap-4"><Field label="Starts" value="12 Mar 2026" /><Field label="Ends" value="14 Mar 2026" /></div>
                        <Field label="Venue" value="Djibouti Conference Centre" />
                      </div>
                    </div>
                  )}
                  {step === 4 && (
                    <div>
                      <h1 className="font-display text-[28px] font-semibold text-primary tracking-[-0.025em]">Invite your team</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6]">Bring in co-organizers and check-in staff. Optional — add them anytime.</p>
                      <div className="mt-7 grid gap-3">
                        <div className="flex flex-wrap gap-2">
                          {["emeka@sahel.co", "zainab@sahel.co"].map((e, i) => (
                            <span key={i} className="inline-flex items-center gap-1.5 bg-primary-soft text-primary rounded-full pl-3 pr-2 py-1.5 text-[12.5px] font-medium">{e}<button className="text-primary/60 hover:text-primary"><Icon.X w={13} /></button></span>
                          ))}
                        </div>
                        <Field label="Invite by email" placeholder="teammate@company.com" />
                        <button className="text-[13px] text-primary font-medium text-left">+ Add another</button>
                      </div>
                    </div>
                  )}
                  {step === 5 && (
                    <div className="text-center py-6">
                      <div className="inline-grid place-items-center w-16 h-16 rounded-2xl bg-primary-soft text-primary mb-6"><Icon.Check w={30} /></div>
                      <h1 className="font-display text-[30px] font-semibold text-primary tracking-[-0.025em]">You're all set, Adaeze.</h1>
                      <p className="mt-3 text-ink-soft text-[15px] leading-[1.6] max-w-[420px] mx-auto">Your workspace and first event are ready. Publish your event page, open registration, and watch the cards roll in.</p>
                      <div className="mt-8 grid sm:grid-cols-3 gap-3 text-left">
                        {[["Publish event page", "Layout"], ["Set up tickets", "Ticket"], ["Build your agenda", "Grid"]].map(([t, ic], i) => {
                          const IconC = Icon[ic]; return (
                            <div key={i} className="bg-surface border border-border rounded-2xl p-4"><span className="w-9 h-9 rounded-lg bg-primary-soft text-primary grid place-items-center mb-3"><IconC w={16} /></span><div className="text-[13px] font-medium text-ink leading-tight">{t}</div></div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              </div>
              {/* footer nav */}
              <div className="border-t border-border bg-cream/80 backdrop-blur px-6 sm:px-10 py-4">
                <div className="max-w-[560px] mx-auto flex items-center justify-between">
                  {step > 0 && step < 5 ? <button onClick={back} className="inline-flex items-center gap-1.5 text-[13.5px] text-muted hover:text-primary transition-colors"><Icon.ChevLeft w={15} /> Back</button> : <span />}
                  {step < 5 ? (
                    <div className="flex items-center gap-3">
                      {(step === 4) && <button onClick={next} className="text-[13.5px] text-muted hover:text-primary">Skip</button>}
                      <button onClick={next} className="cardly-cta inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-primary text-cream font-medium hover:bg-primary-dark">{step === 0 ? "Get started" : "Continue"} <Icon.Arrow w={16} /></button>
                    </div>
                  ) : (
                    <a href="../dashboard/dashboard.html" className="cardly-cta inline-flex items-center gap-2 px-6 py-3 rounded-lg bg-primary text-cream font-medium hover:bg-primary-dark mx-auto">Enter your dashboard <Icon.Arrow w={16} /></a>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
