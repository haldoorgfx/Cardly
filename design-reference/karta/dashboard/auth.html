<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {
        colors: { primary: "#1F4D3A", "primary-dark": "#163828", "primary-soft": "#E8EFEB", accent: "#E8C57E", "accent-dark": "#C9A45E", ink: "#0F1F18", "ink-soft": "#3A4A42", muted: "#6B7A72", cream: "#FAF6EE", surface: "#FFFFFF", border: "#E5E0D4", success: "#2D7A4F" },
        fontFamily: { display: ['"DM Sans"', "sans-serif"], sans: ['"Inter"', "sans-serif"], mono: ['"JetBrains Mono"', "monospace"] },
      } } };
    </script>
    <style>
      html, body { color: #0F1F18; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #FAF6EE; }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }
      ::selection { background: #1F4D3A; color: #FAF6EE; }
      *:focus-visible { outline: 2px solid rgba(31,77,58,0.4); outline-offset: 2px; border-radius: 4px; }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel">
      // Karta marketing card used on the auth split panel
      function AuthCard() {
        return (
          <div className="rounded-2xl overflow-hidden relative" style={{ width: 230, height: 322, background: "linear-gradient(135deg,#163828,#1F4D3A 55%,#2A6A50)", boxShadow: "0 30px 60px -20px rgba(15,31,24,0.6)" }}>
            <div aria-hidden className="absolute inset-0" style={{ background: "radial-gradient(60% 50% at 80% 8%, rgba(232,197,126,0.45), transparent 60%)" }} />
            <div className="relative h-full flex flex-col p-5">
              <div className="flex items-center justify-between">
                <span className="font-mono text-[8px] tracking-[0.18em] uppercase text-accent">Africa Tech Fest</span>
                <span className="inline-block w-5 h-5 rounded" style={{ background: "linear-gradient(135deg,#FAF6EE,#E8C57E)" }} />
              </div>
              <div className="mt-auto">
                <span className="font-mono text-[8px] tracking-[0.16em] uppercase text-cream/60">I'm speaking at</span>
                <div className="w-14 h-14 rounded-full my-3 grid place-items-center text-cream font-display font-bold text-[18px]" style={{ background: "linear-gradient(135deg,#C9A45E,#1F4D3A)" }}>KM</div>
                <div className="font-display text-cream font-bold tracking-tight text-[19px] leading-tight">Kwame Mensah</div>
                <div className="text-cream/70 text-[12px] mt-1">Product Engineer · Paystack</div>
                <div className="flex items-center gap-2 mt-4 pt-4 border-t border-cream/15 font-mono text-cream/60 text-[10px]">
                  <span>12 MAR</span><span>·</span><span>LAGOS</span>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function Logo() {
        return (
          <div className="flex items-center gap-2.5">
            <span aria-hidden className="inline-block w-8 h-8 rounded-lg" style={{ background: "linear-gradient(135deg, #1F4D3A 0%, #2A6A50 60%, #E8C57E 100%)" }} />
            <span className="font-display text-[22px] font-bold tracking-tight text-primary">Karta</span>
          </div>
        );
      }

      function Input({ label, type = "text", value = "", placeholder, hint }) {
        return (
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="font-mono text-[9.5px] tracking-[0.14em] uppercase text-muted">{label}</label>
              {hint}
            </div>
            <input type={type} defaultValue={value} placeholder={placeholder}
              className="w-full bg-surface border border-border rounded-lg px-3.5 py-2.5 text-[14px] text-ink placeholder:text-muted/60 focus:border-primary/50 transition-colors" />
          </div>
        );
      }

      function PrimaryBtn({ children, onClick }) {
        return (
          <button onClick={onClick} className="w-full inline-flex items-center justify-center gap-2 px-5 py-3 rounded-lg bg-primary text-cream font-medium text-[14px] hover:bg-primary-dark transition-colors" style={{ boxShadow: "inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.2)" }}>
            {children}
          </button>
        );
      }

      function SocialRow() {
        return (
          <div className="grid grid-cols-2 gap-2.5">
            {[["Google", "G"], ["Apple", ""]].map((s, i) => (
              <button key={i} className="inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border border-border bg-surface text-[13.5px] font-medium text-ink hover:border-primary/40 transition-colors">
                <span className="font-display font-bold text-primary">{s[1] || "⌘"}</span> {s[0]}
              </button>
            ))}
          </div>
        );
      }

      function Divider({ children }) {
        return (
          <div className="flex items-center gap-3 my-1">
            <span className="flex-1 h-px bg-border" />
            <span className="font-mono text-[10px] tracking-[0.14em] uppercase text-muted">{children}</span>
            <span className="flex-1 h-px bg-border" />
          </div>
        );
      }

      const VIEWS = {
        signin: {
          title: "Welcome back", sub: "Sign in to manage your events.",
          body: (go) => (
            <div className="grid gap-3.5">
              <SocialRow />
              <Divider>or</Divider>
              <Input label="Email" type="email" placeholder="you@company.com" />
              <Input label="Password" type="password" value="········" hint={<a href="#" onClick={(e)=>{e.preventDefault();go("forgot");}} className="font-mono text-[10px] tracking-[0.06em] text-primary hover:underline">Forgot?</a>} />
              <PrimaryBtn>Sign in <Icon.Arrow w={15} /></PrimaryBtn>
              <p className="text-center text-[13px] text-ink-soft">New to Karta? <a href="#" onClick={(e)=>{e.preventDefault();go("signup");}} className="text-primary font-medium hover:underline">Create an account</a></p>
            </div>
          ),
        },
        signup: {
          title: "Create your account", sub: "Run your first event free — no card required.",
          body: (go) => (
            <div className="grid gap-3.5">
              <SocialRow />
              <Divider>or</Divider>
              <Input label="Full name" placeholder="Adaeze Okafor" />
              <Input label="Work email" type="email" placeholder="you@company.com" />
              <Input label="Password" type="password" placeholder="At least 8 characters" />
              <PrimaryBtn>Create account <Icon.Arrow w={15} /></PrimaryBtn>
              <p className="text-center text-[12px] text-muted leading-relaxed">By continuing you agree to Karta's Terms and Privacy Policy.</p>
              <p className="text-center text-[13px] text-ink-soft">Already have an account? <a href="#" onClick={(e)=>{e.preventDefault();go("signin");}} className="text-primary font-medium hover:underline">Sign in</a></p>
            </div>
          ),
        },
        forgot: {
          title: "Reset your password", sub: "We'll email you a link to set a new one.",
          body: (go) => (
            <div className="grid gap-3.5">
              <Input label="Email" type="email" placeholder="you@company.com" />
              <PrimaryBtn>Send reset link <Icon.Arrow w={15} /></PrimaryBtn>
              <button onClick={()=>go("signin")} className="text-center text-[13px] text-primary font-medium hover:underline">← Back to sign in</button>
            </div>
          ),
        },
        invite: {
          title: "Join Karta Events Co.", sub: "Emeka invited you to help manage events.",
          body: (go) => (
            <div className="grid gap-3.5">
              <div className="flex items-center gap-3 bg-primary-soft/50 border border-primary/15 rounded-xl px-4 py-3">
                <span className="w-9 h-9 rounded-full grid place-items-center text-cream font-display text-[12px] font-semibold" style={{ background: "linear-gradient(135deg,#1F4D3A,#2A6A50)" }}>EN</span>
                <div className="text-[12.5px] text-ink-soft leading-snug"><span className="font-medium text-ink">Emeka Nwosu</span> invited you as an <span className="font-medium text-primary">Editor</span>.</div>
              </div>
              <Input label="Full name" placeholder="Your name" />
              <Input label="Password" type="password" placeholder="Set a password" />
              <PrimaryBtn>Accept & join <Icon.Arrow w={15} /></PrimaryBtn>
            </div>
          ),
        },
      };

      function Auth() {
        const [view, setView] = React.useState("signin");
        const [_, force] = React.useState(0);
        const go = (v) => { setView(v); };
        const tabs = [["signin", "Sign in"], ["signup", "Sign up"], ["forgot", "Forgot"], ["invite", "Invite"]];
        const v = VIEWS[view];
        return (
          <div className="min-h-screen grid lg:grid-cols-2">
            {/* Left — form */}
            <div className="flex flex-col px-6 sm:px-12 lg:px-16 py-8">
              <Logo />
              <div className="flex-1 flex flex-col justify-center max-w-[380px] w-full mx-auto py-8">
                <h1 className="font-display text-[30px] font-semibold text-primary tracking-[-0.02em]">{v.title}</h1>
                <p className="text-ink-soft text-[15px] mt-2 mb-7">{v.sub}</p>
                {v.body(go)}
              </div>
              {/* demo view switcher */}
              <div className="flex items-center gap-1.5 justify-center">
                <span className="font-mono text-[8.5px] tracking-[0.18em] uppercase text-muted/70 mr-1">Preview</span>
                {tabs.map(([id, label]) => (
                  <button key={id} onClick={() => go(id)} className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-colors ${view === id ? "bg-primary text-cream" : "text-muted hover:text-primary border border-border"}`}>{label}</button>
                ))}
              </div>
            </div>
            {/* Right — brand panel */}
            <div className="hidden lg:flex relative overflow-hidden items-center justify-center" style={{ background: "linear-gradient(150deg,#163828 0%,#1F4D3A 55%,#235741 100%)" }}>
              <div aria-hidden className="absolute inset-0" style={{ background: "radial-gradient(50% 50% at 80% 20%, rgba(232,197,126,0.22), transparent 60%)" }} />
              <svg aria-hidden viewBox="0 0 600 800" preserveAspectRatio="none" className="absolute inset-0 w-full h-full" style={{ opacity: 0.08 }}>
                {Array.from({ length: 7 }).map((_, i) => (
                  <path key={i} d={`M -40 ${120 + i * 90} Q 200 ${40 + i * 90} 320 ${160 + i * 90} T 660 ${130 + i * 90}`} fill="none" stroke="#E8C57E" strokeWidth="1.5" />
                ))}
              </svg>
              <div className="relative text-center px-12">
                <div className="grid place-items-center mb-8" style={{ transform: "rotate(-4deg)" }}><AuthCard /></div>
                <div className="font-display text-cream text-[24px] font-semibold tracking-[-0.02em] leading-tight max-w-[340px] mx-auto">The event platform that makes every attendee want to share.</div>
                <div className="mt-4 flex items-center justify-center gap-5 font-mono text-[11px] text-cream/55">
                  <span><span className="text-accent">4,200+</span> organizers</span>
                  <span><span className="text-accent">850+</span> events</span>
                  <span><span className="text-accent">11k+</span> cards</span>
                </div>
              </div>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<Auth />);
    </script>
  </body>
</html>
