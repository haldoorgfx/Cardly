<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — Help & Resources</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { theme: { extend: {
        colors: { primary: "#1F4D3A", "primary-dark": "#163828", "primary-soft": "#E8EFEB", accent: "#E8C57E", "accent-dark": "#C9A45E", ink: "#0F1F18", "ink-soft": "#3A4A42", muted: "#6B7A72", cream: "#FAF6EE", surface: "#FFFFFF", border: "#E5E0D4", success: "#2D7A4F", danger: "#B8423C" },
        fontFamily: { display: ['"DM Sans"', "sans-serif"], sans: ['"Inter"', "sans-serif"], mono: ['"JetBrains Mono"', "monospace"] },
      } } };
    </script>
    <style>
      html, body { color: #0F1F18; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      body { background-color: #FAF6EE; background-image: radial-gradient(circle, rgba(15,31,24,0.04) 1px, transparent 1px); background-size: 24px 24px; }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }
      ::selection { background: #1F4D3A; color: #FAF6EE; }
      *:focus-visible { outline: 2px solid rgba(31,77,58,0.4); outline-offset: 2px; border-radius: 4px; }
      .cardly-cta { box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.2); transition: transform .2s; }
      .noscroll::-webkit-scrollbar { display: none; } .noscroll { scrollbar-width: none; }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel">
      const { useState } = React;
      const TABS = [["help", "Help center"], ["status", "Status"], ["changelog", "Changelog"], ["legal", "Legal"]];

      function Nav({ tab, setTab }) {
        return (
          <header className="sticky top-0 z-40 bg-cream/85 backdrop-blur border-b border-border/60">
            <div className="mx-auto max-w-[1080px] px-5 lg:px-8 h-[58px] flex items-center justify-between">
              <a href="../index.html" className="flex items-center gap-2"><span className="w-7 h-7 rounded-md" style={{ background: "linear-gradient(135deg,#1F4D3A,#2A6A50 60%,#E8C57E)" }} /><span className="font-display text-[18px] font-bold text-primary tracking-tight">Karta</span></a>
              <nav className="flex items-center gap-1 overflow-x-auto noscroll">
                {TABS.map(([id, label]) => <button key={id} onClick={() => setTab(id)} className={`relative shrink-0 px-3.5 py-2 text-[13.5px] font-medium transition-colors ${tab === id ? "text-primary" : "text-muted hover:text-ink-soft"}`}>{label}{tab === id && <span className="absolute left-2.5 right-2.5 -bottom-px h-0.5 rounded-full bg-primary" />}</button>)}
              </nav>
              <a href="../site/landing-page.html" className="hidden sm:inline text-[13.5px] text-ink-soft hover:text-primary">← Product</a>
            </div>
          </header>
        );
      }

      // ── HELP ──────────────────────────────────────────────────────
      function Help() {
        const cats = [["Getting started", "Bolt", "8 articles"], ["Registration & tickets", "Ticket", "14 articles"], ["Agenda & speakers", "Grid", "9 articles"], ["Check-in", "Scan", "6 articles"], ["The Karta Card", "IdCard", "7 articles"], ["Billing & plans", "CreditCard", "11 articles"]];
        const pop = ["How do I publish my event page?", "Setting up paid tickets with Flutterwave", "Customizing the Karta Card for my event", "Running offline QR check-in", "Inviting team members & roles"];
        return (
          <div>
            <section className="relative">
              <div className="mx-auto max-w-[760px] px-5 pt-14 lg:pt-20 pb-10 text-center">
                <h1 className="font-display text-primary font-bold tracking-[-0.03em] leading-[1.05]" style={{ fontSize: "clamp(30px,5vw,48px)" }}>How can we help?</h1>
                <p className="mt-4 text-ink-soft text-[16px]">Search the docs, or browse by topic.</p>
                <div className="mt-7 flex items-center gap-2.5 bg-surface border border-border rounded-2xl px-4 py-3.5 shadow-sm max-w-[520px] mx-auto"><Icon.Search w={18} className="text-muted" /><span className="text-[15px] text-muted flex-1 text-left">Search help articles…</span></div>
              </div>
            </section>
            <section className="mx-auto max-w-[1080px] px-5 lg:px-8 pb-6">
              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {cats.map(([t, ic, n], i) => { const IconC = Icon[ic] || Icon.Bolt; return (
                  <a key={i} href="#" onClick={(e) => e.preventDefault()} className="bg-surface border border-border rounded-2xl p-5 hover:border-primary/40 hover:-translate-y-0.5 transition-all">
                    <span className="w-10 h-10 rounded-xl bg-primary-soft text-primary grid place-items-center mb-4"><IconC w={20} /></span>
                    <div className="font-display text-[15px] font-semibold text-ink tracking-tight">{t}</div>
                    <div className="font-mono text-[11px] text-muted mt-1.5">{n}</div>
                  </a>
                ); })}
              </div>
            </section>
            <section className="mx-auto max-w-[1080px] px-5 lg:px-8 pb-10">
              <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-muted mb-3">Popular articles</div>
              <div className="bg-surface border border-border rounded-2xl divide-y divide-border/60">
                {pop.map((p, i) => <a key={i} href="#" onClick={(e) => e.preventDefault()} className="flex items-center gap-3 px-5 py-3.5 hover:bg-cream/50 transition-colors"><Icon.Layout w={15} className="text-primary/60" /><span className="flex-1 text-[14px] text-ink-soft">{p}</span><Icon.Arrow w={14} className="text-muted" /></a>)}
              </div>
              <div className="mt-5 rounded-2xl p-6 flex items-center justify-between gap-4" style={{ background: "linear-gradient(135deg,#0D1F17,#1F4D3A 70%,#235741)" }}>
                <div><div className="font-display text-cream text-[18px] font-semibold">Still need help?</div><div className="text-cream/70 text-[13.5px] mt-1">Our team replies in under an hour during the day.</div></div>
                <button className="cardly-cta inline-flex items-center gap-2 px-4 py-2.5 rounded-lg bg-accent text-primary-dark text-[13px] font-semibold shrink-0"><Icon.Chat w={14} /> Contact support</button>
              </div>
            </section>
          </div>
        );
      }

      // ── STATUS ────────────────────────────────────────────────────
      function Status() {
        const svc = [["API", "99.99%", "Operational"], ["Web app", "99.98%", "Operational"], ["Payments", "99.95%", "Operational"], ["Email & notifications", "99.90%", "Degraded"], ["Check-in sync", "100%", "Operational"], ["Streaming", "99.97%", "Operational"]];
        const inc = [["Email delivery delays (upstream provider)", "Today · 09:12", "#C9A45E", "Monitoring"], ["Resolved: elevated API latency in eu-west", "28 Feb", "#2D7A4F", "Resolved"], ["Resolved: payments webhook retry backlog", "21 Feb", "#2D7A4F", "Resolved"]];
        const degraded = svc.some((s) => s[2] !== "Operational");
        return (
          <section className="mx-auto max-w-[800px] px-5 lg:px-8 py-12 lg:py-16">
            <h1 className="font-display text-primary font-bold tracking-[-0.03em] text-[30px] mb-6">System status</h1>
            <div className={`rounded-2xl border p-5 mb-6 flex items-center gap-4 ${degraded ? "border-amber-200 bg-amber-50/60" : "border-emerald-200 bg-emerald-50/60"}`}>
              <span className={`w-11 h-11 rounded-xl grid place-items-center ${degraded ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700"}`}>{degraded ? <Icon.Bell w={20} /> : <Icon.Check w={20} />}</span>
              <div><div className="font-display text-[16px] font-semibold text-ink">{degraded ? "Partial degradation" : "All systems operational"}</div><div className="text-[13px] text-ink-soft mt-0.5">{degraded ? "Email delivery is delayed — we're on it." : "Everything running smoothly."}</div></div>
              <span className="ml-auto font-mono text-[10.5px] text-muted hidden sm:inline">90-day uptime 99.97%</span>
            </div>
            <div className="bg-surface border border-border rounded-2xl divide-y divide-border/60 mb-7">
              {svc.map((s, i) => <div key={i} className="flex items-center gap-3 px-5 py-3.5"><span className={`w-2 h-2 rounded-full ${s[2] === "Operational" ? "bg-emerald-500" : "bg-amber-500"}`} /><span className="flex-1 text-[14px] font-medium text-ink">{s[0]}</span><span className="font-mono text-[11.5px] text-muted w-[64px] text-right">{s[1]}</span><span className={`text-[11px] font-medium px-2 py-0.5 rounded-full border ${s[2] === "Operational" ? "bg-emerald-50 text-emerald-700 border-emerald-200" : "bg-amber-50 text-amber-700 border-amber-200"}`}>{s[2]}</span></div>)}
            </div>
            <div className="font-mono text-[10px] tracking-[0.2em] uppercase text-muted mb-3">Incident history</div>
            <div className="relative pl-6">
              <span className="absolute left-[5px] top-1.5 bottom-1.5 w-px bg-border" />
              <div className="grid gap-5">
                {inc.map((it, i) => <div key={i} className="relative"><span className="absolute -left-6 top-1 w-3 h-3 rounded-full ring-4 ring-cream" style={{ background: it[2] }} /><div className="text-[14px] text-ink">{it[0]} · <span className="text-muted">{it[3]}</span></div><div className="font-mono text-[11px] text-muted mt-0.5">{it[1]}</div></div>)}
              </div>
            </div>
          </section>
        );
      }

      // ── CHANGELOG ─────────────────────────────────────────────────
      function Changelog() {
        const rel = [
          { v: "2.8", date: "28 May 2026", tag: "Latest", items: ["AI matchmaking for attendee networking", "Sponsor lead retrieval & booths", "Faster offline check-in sync"] },
          { v: "2.7", date: "02 May 2026", items: ["Multi-track agenda builder", "Karta Card video export", "Flutterwave payouts for organizers"] },
          { v: "2.6", date: "14 Apr 2026", items: ["Gamification & leaderboards", "Webhook retries + delivery logs", "Team roles & permissions"] },
          { v: "2.5", date: "20 Mar 2026", items: ["Live Q&A and polls", "White-label custom domains", "Email template designer"] },
        ];
        return (
          <section className="mx-auto max-w-[760px] px-5 lg:px-8 py-12 lg:py-16">
            <h1 className="font-display text-primary font-bold tracking-[-0.03em] text-[30px]">What's new</h1>
            <p className="text-ink-soft text-[15px] mt-2 mb-8">Every improvement we ship to the platform.</p>
            <div className="relative pl-7">
              <span className="absolute left-[7px] top-2 bottom-2 w-px bg-border" />
              <div className="grid gap-8">
                {rel.map((r, i) => (
                  <div key={i} className="relative">
                    <span className="absolute -left-7 top-1.5 w-3.5 h-3.5 rounded-full bg-accent ring-4 ring-cream" />
                    <div className="flex items-center gap-2.5 mb-3"><span className="font-display text-[18px] font-semibold text-primary">v{r.v}</span>{r.tag && <span className="font-mono text-[10px] tracking-[0.12em] uppercase bg-accent/20 text-accent-dark border border-accent/40 px-2 py-0.5 rounded-full">{r.tag}</span>}<span className="font-mono text-[11.5px] text-muted">{r.date}</span></div>
                    <div className="bg-surface border border-border rounded-2xl p-5 grid gap-2.5">{r.items.map((it, j) => <div key={j} className="flex items-start gap-2.5 text-[14px] text-ink-soft"><span className="text-primary mt-0.5"><Icon.Check w={14} /></span>{it}</div>)}</div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        );
      }

      // ── LEGAL ─────────────────────────────────────────────────────
      function Legal() {
        const [doc, setDoc] = useState("privacy");
        const privacy = [["Overview", "Karta helps organizers run events. This policy explains what we collect, why, and your choices. We keep it short and plain."], ["What we collect", "Account details you provide, event and attendee data you create, and basic usage analytics to improve the product. Attendees control their own profile and card photo."], ["How we use it", "To operate the platform, process payments, send transactional emails, and provide support. We never sell personal data."], ["Your rights", "You can export or delete your data anytime from Settings. Attendees can remove their card and profile on request."]];
        const terms = [["Agreement", "By using Karta you agree to these terms. If you're using it for an organization, you confirm you're authorized to act for it."], ["Your content", "You own your events and content. You grant us a license to host and display it so the platform works. You're responsible for what you publish."], ["Payments", "Paid plans bill in advance. Ticketing payouts are processed via our payment partners, subject to their terms and applicable fees."], ["Acceptable use", "No spam, fraud, or illegal events. We may suspend accounts that violate these terms or put attendees at risk."]];
        const rows = doc === "privacy" ? privacy : terms;
        return (
          <section className="mx-auto max-w-[820px] px-5 lg:px-8 py-12 lg:py-16">
            <h1 className="font-display text-primary font-bold tracking-[-0.03em] text-[30px] mb-5">Legal</h1>
            <div className="inline-flex bg-surface border border-border rounded-lg p-0.5 mb-8">
              {[["privacy", "Privacy Policy"], ["terms", "Terms of Service"]].map(([id, l]) => <button key={id} onClick={() => setDoc(id)} className={`px-4 py-2 rounded-md text-[13px] font-medium transition-colors ${doc === id ? "bg-primary text-cream" : "text-ink-soft hover:text-primary"}`}>{l}</button>)}
            </div>
            <div className="font-mono text-[11px] text-muted mb-6">Last updated 28 May 2026</div>
            <div className="grid gap-7">
              {rows.map((r, i) => <div key={i}><h2 className="font-display text-[18px] font-semibold text-primary tracking-tight mb-2">{r[0]}</h2><p className="text-[14.5px] text-ink-soft leading-[1.7]">{r[1]}</p></div>)}
            </div>
            <div className="mt-9 rounded-2xl bg-primary-soft/50 border border-primary/15 p-5 text-[13.5px] text-ink-soft leading-relaxed">This is a product-design prototype. Replace with your reviewed legal copy before launch — questions to <span className="text-primary font-medium">legal@karta.app</span>.</div>
          </section>
        );
      }

      function App() {
        const [tab, setTab] = useState("help");
        return (
          <div className="min-h-screen flex flex-col">
            <Nav tab={tab} setTab={setTab} />
            <main className="flex-1">
              {tab === "help" && <Help />}
              {tab === "status" && <Status />}
              {tab === "changelog" && <Changelog />}
              {tab === "legal" && <Legal />}
            </main>
            <footer className="bg-primary-dark text-cream/70">
              <div className="mx-auto max-w-[1080px] px-5 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-3">
                <div className="flex items-center gap-2"><span className="w-6 h-6 rounded-md" style={{ background: "linear-gradient(135deg,#FAF6EE,#E8C57E)" }} /><span className="font-display text-[16px] font-bold text-cream">Karta</span></div>
                <div className="flex items-center gap-5 text-[12.5px]">{TABS.map(([id, l]) => <button key={id} onClick={() => setTab(id)} className="hover:text-cream transition-colors">{l}</button>)}</div>
                <div className="font-mono text-[10.5px] tracking-[0.1em] uppercase text-cream/45">© 2026 Karta</div>
              </div>
            </footer>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
