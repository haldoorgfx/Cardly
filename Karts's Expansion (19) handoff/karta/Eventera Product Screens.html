<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventera · Product Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="karta.css">
<link rel="stylesheet" href="web.css">
<style>
  :root{
    --display:'DM Sans', sans-serif;
    --body:'Inter', system-ui, sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; }

  /* artboard wrapper centers each frame */
  .frame{ width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(60% 55% at 28% 16%, rgba(31,77,58,0.05) 0%, transparent 62%),
      radial-gradient(52% 52% at 84% 90%, rgba(232,197,126,0.09) 0%, transparent 60%),
      var(--cream-canvas);
  }

  /* ===== Browser frame (matches hero) ===== */
  .eb{ background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:13px; overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,0.8) inset, 0 50px 90px -52px rgba(15,31,24,0.34), 0 24px 50px -38px rgba(15,31,24,0.22); }
  .eb-chrome{ height:44px; background:#F0EDE8; border-bottom:1px solid var(--cream-border); display:flex; align-items:center; gap:14px; padding:0 16px; }
  .eb-tl{ display:flex; gap:8px; } .eb-tl span{ width:11px; height:11px; border-radius:50%; }
  .eb-url{ flex:1; height:26px; border-radius:8px; background:var(--cream-surface); border:1px solid var(--cream-border); display:flex; align-items:center; gap:8px; padding:0 11px; font-family:var(--body); font-size:11.5px; color:var(--ink-muted); }
  .eb-url svg{ width:11px; height:11px; stroke:var(--ink-muted); fill:none; stroke-width:2; flex:none; }
  .eb-plus{ width:24px; height:24px; border-radius:6px; border:1px solid var(--cream-border); display:flex; align-items:center; justify-content:center; color:var(--ink-muted); font-size:15px; }

  /* ===== App shell ===== */
  .es-app{ display:grid; grid-template-columns:188px 1fr; height:472px; }
  .es-side{ background:#FBFAF6; border-right:1px solid var(--cream-border); padding:16px 11px; display:flex; flex-direction:column; }
  .es-wm{ padding:2px 9px 15px; } .es-wm img{ height:20px; width:auto; display:block; }
  .es-nav{ display:flex; flex-direction:column; gap:3px; }
  .es-ni{ height:33px; display:flex; align-items:center; gap:10px; padding:0 10px; border-radius:7px; font-family:var(--display); font-size:13px; color:var(--ink-soft); border-left:2px solid transparent; }
  .es-ni svg{ width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.7; flex:none; }
  .es-ni.on{ background:var(--forest-soft); color:var(--forest); font-weight:500; border-left:2px solid var(--forest); }
  .es-slab{ font-family:var(--body); font-weight:500; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); padding:0 10px; margin:15px 0 7px; }
  .es-pro{ margin:0 9px; align-self:flex-start; background:var(--forest-soft); color:var(--forest); font-family:var(--mono); font-weight:500; font-size:10.5px; padding:5px 11px; border-radius:999px; }

  .es-main{ padding:18px 22px; display:flex; flex-direction:column; overflow:hidden; }
  .es-head{ display:flex; align-items:center; justify-content:space-between; }
  .es-crumb{ font-family:var(--body); font-size:12.5px; color:var(--ink-muted); }
  .es-crumb b{ color:var(--forest); font-weight:600; font-family:var(--display); }
  .es-tools{ display:flex; align-items:center; gap:13px; }
  .es-bell{ width:17px; height:17px; stroke:var(--ink-muted); fill:none; stroke-width:1.7; }
  .es-mini-cta{ background:var(--forest); color:var(--cream-surface); font-family:var(--display); font-weight:500; font-size:12px; padding:7px 14px; border-radius:8px; white-space:nowrap; }
  .es-titlerow{ display:flex; align-items:center; justify-content:space-between; margin-top:18px; }
  .es-titlerow h1{ font-family:var(--display); font-weight:600; font-size:21px; letter-spacing:-0.02em; color:var(--forest); margin:0; white-space:nowrap; }
  .es-add{ font-family:var(--display); font-weight:500; font-size:12.5px; color:var(--forest); background:var(--forest-soft); padding:6px 12px; border-radius:7px; white-space:nowrap; }

  /* skeleton */
  .sk{ background:#E7E2D6; border-radius:999px; height:8px; display:inline-block; vertical-align:middle; }
  .sk-d{ background:rgba(250,246,238,0.22); }
  .sk-g{ background:rgba(232,197,126,0.30); }

  /* ===== Event page ===== */
  .ep-cover{ position:relative; height:150px; padding:18px 24px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
    background:linear-gradient(135deg,#163828 0%,#1F4D3A 55%,#2A6A50 100%); }
  .ep-cover-glow{ position:absolute; inset:0; background:radial-gradient(70% 90% at 100% 0%, rgba(232,197,126,0.32), transparent 60%); }
  .ep-presents{ position:relative; font-family:var(--mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--gold); }
  .ep-title{ position:relative; font-family:var(--display); font-weight:700; font-size:27px; letter-spacing:-0.02em; color:#fff; line-height:1.04; }
  .ep-meta{ position:relative; display:flex; gap:20px; margin-top:9px; font-family:var(--mono); font-size:11px; color:rgba(250,246,238,0.85); }
  .ep-meta span{ display:inline-flex; align-items:center; gap:6px; }
  .ep-meta svg, .gld{ width:13px; height:13px; stroke:var(--gold); fill:none; stroke-width:1.8; }
  .ep-body{ display:grid; grid-template-columns:1fr 250px; gap:24px; padding:22px 24px; height:278px; }
  .ep-sec{ font-family:var(--body); font-weight:600; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-muted); margin-bottom:12px; }
  .ep-agrow{ display:flex; align-items:center; gap:11px; padding:9px 0; }
  .ep-agrow + .ep-agrow{ border-top:1px solid var(--cream-border); }
  .ep-time{ font-family:var(--mono); font-size:11px; color:var(--ink-muted); width:36px; }
  .ep-dot{ width:7px; height:7px; border-radius:50%; flex:none; }
  .ep-stitle{ font-family:var(--display); font-size:14px; color:var(--ink); }
  .ep-card{ background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:12px; padding:20px; box-shadow:var(--e1); align-self:start; }
  .ep-tk-k{ font-family:var(--body); font-weight:600; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); }
  .ep-tk-v{ font-family:var(--display); font-weight:700; font-size:26px; letter-spacing:-0.02em; color:var(--forest); margin-top:5px; }
  .ep-cta{ margin-top:14px; height:42px; border-radius:10px; background:var(--gold); color:var(--ink); display:flex; align-items:center; justify-content:center; gap:7px; font-family:var(--display); font-weight:600; font-size:13.5px; white-space:nowrap; box-shadow:0 6px 16px -6px rgba(201,164,94,0.55); }
  .ep-cta svg{ width:15px; height:15px; stroke:var(--ink); fill:none; stroke-width:2.2; }
  .ep-pay{ display:flex; gap:6px; margin-top:12px; }
  .ep-paychip{ flex:1; text-align:center; font-family:var(--body); font-size:9.5px; color:var(--ink-soft); background:var(--cream-soft); border:1px solid var(--cream-border); border-radius:6px; padding:5px 0; }
  .ep-host{ display:flex; align-items:center; gap:10px; margin-top:16px; padding-top:14px; border-top:1px solid var(--cream-border); }
  .ep-host-n{ font-family:var(--display); font-weight:600; font-size:12px; color:var(--ink); white-space:nowrap; }
  .ep-host-s{ font-family:var(--mono); font-size:10.5px; color:var(--ink-muted); margin-top:2px; }

  /* ===== Tickets ===== */
  .tk-list{ display:flex; flex-direction:column; gap:9px; margin-top:16px; }
  .tk-row{ display:flex; align-items:center; gap:13px; background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:10px; padding:13px 15px; }
  .tk-row.active{ border-color:rgba(31,77,58,0.4); background:rgba(232,239,235,0.5); }
  .tk-row.sold{ opacity:0.55; }
  .tk-ic{ color:var(--forest); } .tk-row.sold .tk-ic{ color:var(--ink-muted); }
  .tk-ic svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.7; }
  .tk-meta{ width:160px; }
  .tk-n{ font-family:var(--display); font-weight:500; font-size:14px; color:var(--ink); }
  .tk-row.sold .tk-n{ text-decoration:line-through; color:var(--ink-muted); }
  .tk-s{ font-family:var(--mono); font-size:10.5px; color:var(--ink-muted); margin-top:2px; }
  .tk-bar{ flex:1; height:6px; border-radius:999px; background:#ECE7DB; overflow:hidden; }
  .tk-fill{ height:100%; border-radius:999px; background:var(--forest); }
  .tk-row.sold .tk-fill{ background:var(--ink-muted); }
  .tk-p{ font-family:var(--mono); font-size:14px; color:var(--forest); font-weight:500; width:96px; text-align:right; }
  .tk-row.sold .tk-p{ color:var(--ink-muted); }
  .tk-drag{ width:16px; height:16px; fill:var(--ink-muted); opacity:0.4; }
  .tk-promo{ display:flex; align-items:center; gap:12px; margin-top:16px; padding:13px 15px; border:1px dashed var(--cream-border); border-radius:10px; background:#FBFAF6; }
  .tk-promo-l{ font-family:var(--body); font-weight:600; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); }
  .tk-code{ font-family:var(--mono); font-size:12.5px; color:var(--forest); background:var(--forest-soft); padding:4px 10px; border-radius:6px; }
  .tk-promo-s{ font-family:var(--body); font-size:12px; color:var(--ink-muted); }
  .tk-foot{ display:flex; gap:34px; margin-top:auto; padding-top:16px; border-top:1px solid var(--cream-border); }
  .tk-foot-k{ font-family:var(--body); font-weight:600; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); }
  .tk-foot-v{ font-family:var(--display); font-weight:600; font-size:18px; color:var(--forest); margin-top:5px; }
  .tk-foot-v span{ font-size:12px; color:var(--ink-muted); font-weight:400; }

  /* ===== Agenda ===== */
  .ag-top{ height:50px; display:flex; align-items:center; justify-content:space-between; padding:0 22px; border-bottom:1px solid var(--cream-border); background:var(--cream-surface); }
  .ag-days{ display:flex; gap:4px; }
  .ag-day{ padding:6px 14px; border-radius:7px; font-family:var(--display); font-weight:500; font-size:13px; color:var(--ink-muted); }
  .ag-day.on{ background:var(--forest-soft); color:var(--forest); }
  .ag-actions{ display:flex; gap:9px; align-items:center; }
  .ag-ghost{ font-family:var(--display); font-weight:500; font-size:12.5px; color:var(--forest); border:1px solid var(--cream-border); padding:6px 12px; border-radius:8px; }
  .ag-grid-wrap{ padding:0 22px 18px; }
  .ag-head{ display:grid; grid-template-columns:64px repeat(4,1fr); border-bottom:1px solid var(--cream-border); }
  .ag-th{ padding:12px 10px; font-family:var(--body); font-weight:500; font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:7px; border-right:1px solid var(--cream-border); }
  .ag-th:last-child{ border-right:none; }
  .ag-tdot{ width:7px; height:7px; border-radius:50%; }
  .ag-grid{ position:relative; }
  .ag-grid{ display:grid; grid-template-columns:64px repeat(4,1fr); }
  .ag-timecol{ display:flex; flex-direction:column; }
  .ag-tcell{ padding:3px 8px 0 0; text-align:right; font-family:var(--mono); font-size:10.5px; color:var(--ink-muted); border-right:1px solid var(--cream-border); }
  .ag-col{ border-right:1px solid var(--cream-border); } .ag-col:last-child{ border-right:none; }
  .ag-cell{ border-bottom:1px solid var(--cream-border); }
  .ag-sess{ position:absolute; background:#F7F4F0; border:1px solid var(--cream-border); border-radius:8px; padding:6px 9px; overflow:hidden; }
  .ag-s-t{ font-family:var(--display); font-weight:500; font-size:11.5px; color:var(--forest); line-height:1.2; }
  .ag-s-s{ font-family:var(--body); font-size:10px; color:var(--ink-muted); margin-top:2px; }

  /* ===== Card moment ===== */
  .cm-wrap{ display:grid; grid-template-columns:1fr 320px; height:472px; }
  .cm-form{ padding:30px 30px; display:flex; flex-direction:column; }
  .cm-step{ font-family:var(--mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-hover); }
  .cm-h{ font-family:var(--display); font-weight:700; font-size:28px; letter-spacing:-0.02em; color:var(--forest); margin-top:10px; }
  .cm-sub{ font-family:var(--body); font-size:13.5px; color:var(--ink-muted); margin-top:5px; }
  .cm-field{ background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:9px; padding:10px 13px; margin-top:14px; }
  .cm-k{ font-family:var(--body); font-weight:600; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-muted); }
  .cm-v{ font-family:var(--display); font-size:13.5px; color:var(--ink); margin-top:3px; }
  .cm-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .cm-photo{ display:flex; align-items:center; gap:9px; font-family:var(--body); font-size:12px; color:var(--ink-soft); }
  .cm-av{ width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:600; font-size:10px; color:var(--ink); background:radial-gradient(120% 120% at 30% 25%, #f3e4c1, #c9a45e); }
  .cm-cta{ margin-top:auto; height:46px; border-radius:11px; background:var(--forest); color:var(--cream-surface); display:flex; align-items:center; justify-content:center; gap:8px; font-family:var(--display); font-weight:600; font-size:14px; white-space:nowrap; }
  .cm-cta svg{ width:16px; height:16px; stroke:var(--cream-surface); fill:none; stroke-width:2.2; }

  .cm-stage{ position:relative; display:flex; align-items:center; justify-content:center; background:linear-gradient(180deg, #FBFAF6, #F3EFE6); border-left:1px solid var(--cream-border); }
  .cm-glow{ position:absolute; width:280px; height:280px; border-radius:50%; background:radial-gradient(50% 50% at 50% 50%, rgba(232,197,126,0.5), transparent 65%); filter:blur(20px); }
  .cm-badge{ position:absolute; top:34px; right:30px; display:inline-flex; align-items:center; gap:6px; background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:999px; padding:6px 12px; font-family:var(--mono); font-size:9.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-soft); box-shadow:var(--e1); }
  .cm-badge svg{ fill:var(--gold); stroke:none; }

  /* phone card (shared look) */
  .kcard{ position:relative; width:212px; height:392px; border-radius:24px; padding:24px 19px 16px; display:flex; flex-direction:column; overflow:hidden;
    background:linear-gradient(150deg,#163828 0%,#1F4D3A 52%,#2A6A50 100%);
    box-shadow:0 40px 70px -34px rgba(15,31,24,0.5), 0 0 0 1.5px rgba(232,197,126,0.3); }
  .kcard-lines{ position:absolute; inset:0; opacity:0.5; background-image:repeating-linear-gradient(115deg, rgba(232,197,126,0.05) 0 2px, transparent 2px 9px); }
  .kcard-brand{ position:absolute; top:16px; right:18px; font-family:var(--display); font-weight:600; font-size:9px; letter-spacing:0.18em; color:rgba(232,197,126,0.62); }
  .kcard-av{ width:56px; height:56px; border-radius:50%; border:1.5px solid var(--gold); margin-top:10px; box-shadow:0 0 18px rgba(232,197,126,0.22); }
  .kcard-name{ font-family:var(--display); font-weight:600; font-size:19px; color:#fff; margin-top:14px; }
  .kcard-role{ font-family:var(--body); font-size:12px; color:rgba(250,246,238,0.66); margin-top:3px; }
  .kcard-event{ font-family:var(--mono); font-size:9.5px; color:rgba(232,197,126,0.8); margin-top:10px; }
  .kcard-share{ display:flex; gap:7px; margin-top:auto; }
  .kcard-sb{ flex:1; height:33px; border-radius:999px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-family:var(--body); font-weight:600; font-size:11px; color:rgba(250,246,238,0.85); }
  .kcard-dl{ margin-top:9px; height:39px; border-radius:10px; background:var(--gold); color:var(--ink); display:flex; align-items:center; justify-content:center; gap:6px; font-family:var(--display); font-weight:600; font-size:12.5px; white-space:nowrap; }
  .kcard-dl svg{ width:13px; height:13px; stroke:var(--ink); fill:none; stroke-width:2; }

  /* ===== Phone frame ===== */
  .frame-c{ }
  .ephone{ position:relative; width:260px; height:512px; background:#0C1813; border:1.5px solid rgba(232,197,126,0.3); border-radius:38px; padding:11px;
    box-shadow:0 48px 80px -36px rgba(15,31,24,0.5), 0 0 0 1px rgba(0,0,0,0.18); }
  .ephone-notch{ position:absolute; top:14px; left:50%; transform:translateX(-50%); width:74px; height:7px; border-radius:999px; background:rgba(255,255,255,0.14); z-index:3; }
  .ci{ height:100%; border-radius:28px; background:var(--cream-canvas); padding:22px 18px 18px; display:flex; flex-direction:column; overflow:hidden; }
  .ci-top{ display:flex; align-items:center; justify-content:space-between; }
  .ci-logo{ height:17px; width:auto; }
  .ci-live{ display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--success); background:rgba(45,122,79,0.12); padding:4px 9px; border-radius:999px; }
  .ci-dot{ width:6px; height:6px; border-radius:50%; background:var(--success); }
  .ci-scan{ margin-top:16px; }
  .ci-frame{ position:relative; height:178px; border-radius:16px; background:linear-gradient(160deg,#13261C,#1F4D3A); overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .cnr{ position:absolute; width:26px; height:26px; border:2.5px solid var(--gold); }
  .cnr.tl{ top:14px; left:14px; border-right:none; border-bottom:none; border-radius:8px 0 0 0; }
  .cnr.tr{ top:14px; right:14px; border-left:none; border-bottom:none; border-radius:0 8px 0 0; }
  .cnr.bl{ bottom:14px; left:14px; border-right:none; border-top:none; border-radius:0 0 0 8px; }
  .cnr.br{ bottom:14px; right:14px; border-left:none; border-top:none; border-radius:0 0 8px 0; }
  .ci-qr{ width:96px; height:96px; border-radius:8px; background-color:#fff;
    background-image:
      linear-gradient(90deg,#0C1813 0 33%, transparent 0 67%, #0C1813 0),
      linear-gradient(0deg,#0C1813 0 20%, transparent 0 40%, #0C1813 0 60%, transparent 0 80%, #0C1813 0);
    background-size:18px 18px; background-blend-mode:multiply; opacity:0.92; }
  .ci-laser{ position:absolute; left:24px; right:24px; height:2px; background:linear-gradient(90deg, transparent, var(--gold), transparent); top:50%; box-shadow:0 0 12px rgba(232,197,126,0.7); animation:scan 2.4s ease-in-out infinite; }
  @keyframes scan{ 0%,100%{ transform:translateY(-58px); } 50%{ transform:translateY(58px); } }
  .ci-hint{ text-align:center; font-family:var(--body); font-size:11px; color:var(--ink-muted); margin-top:10px; }
  .ci-result{ margin-top:14px; background:var(--cream-surface); border:1px solid var(--cream-border); border-radius:14px; padding:16px; box-shadow:var(--e1); text-align:center; }
  .ci-check{ width:38px; height:38px; border-radius:50%; background:var(--success); display:flex; align-items:center; justify-content:center; margin:0 auto; }
  .ci-check svg{ width:20px; height:20px; stroke:#fff; fill:none; stroke-width:3; }
  .ci-name{ font-family:var(--display); font-weight:600; font-size:17px; color:var(--forest); margin-top:9px; }
  .ci-tier{ font-family:var(--mono); font-size:10px; color:var(--ink-muted); margin-top:3px; }
  .ci-row{ display:flex; align-items:center; justify-content:space-between; margin-top:14px; font-family:var(--body); font-size:12px; color:var(--ink-soft); }
  .ci-row b{ font-family:var(--display); font-weight:700; font-size:18px; color:var(--forest); }
  .ci-bar{ height:6px; border-radius:999px; background:#ECE7DB; overflow:hidden; margin-top:7px; }
  .ci-fill{ height:100%; border-radius:999px; background:var(--gold); }
  .ci-sub{ font-family:var(--mono); font-size:9.5px; color:var(--ink-muted); margin-top:7px; text-align:left; }

  /* thumbnail for bundler */
  template{ display:none; }
