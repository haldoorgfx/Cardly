<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Karta — Unified Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1F4D3A",
              "primary-dark": "#163828",
              "primary-soft": "#E8EFEB",
              accent: "#E8C57E",
              "accent-dark": "#C9A45E",
              ink: "#0F1F18",
              "ink-soft": "#3A4A42",
              muted: "#6B7A72",
              cream: "#FAF6EE",
              surface: "#FFFFFF",
              border: "#E5E0D4",
              success: "#2D7A4F",
              danger: "#B8423C",
            },
            fontFamily: {
              title: ['"Plus Jakarta Sans"', "sans-serif"],
              display: ['"DM Sans"', "sans-serif"],
              sans: ['"Inter"', "sans-serif"],
              mono: ['"JetBrains Mono"', "monospace"],
            },
          },
        },
      };
    </script>

    <style>
      html, body { color: #0F1F18; font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; background: #FAF6EE; }
      .font-title { font-family: "Plus Jakarta Sans", sans-serif; letter-spacing: -0.025em; }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }
      ::selection { background: #1F4D3A; color: #FAF6EE; }
      .cardly-cta { box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(31,77,58,0.20); transition: transform .2s ease, box-shadow .2s ease, background-color .2s ease; }
      .cardly-cta:hover { transform: translateY(-1px); }
      *::-webkit-scrollbar { width: 10px; height: 10px; }
      *::-webkit-scrollbar-thumb { background: rgba(15,31,24,0.14); border-radius: 6px; border: 3px solid transparent; background-clip: content-box; }
      *:focus-visible { outline: 2px solid rgba(31, 77, 58, 0.4); outline-offset: 2px; border-radius: 4px; }
      @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="icons.jsx"></script>
    <script type="text/babel" src="data.jsx"></script>
    <script type="text/babel" src="dash-ui.jsx"></script>
    <script type="text/babel" src="unified-nav.jsx"></script>
    <script type="text/babel" src="unified-home.jsx"></script>
    <script type="text/babel" src="unified-my-tickets.jsx"></script>
    <script type="text/babel" src="unified-speaking.jsx"></script>
    <script type="text/babel" src="unified-sponsoring.jsx"></script>
    <script type="text/babel" src="unified-app.jsx"></script>
  </body>
</html>
