<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Done · Africa Tech Festival '26</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700;9..40,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand: { primary:'#6c63ff', secondary:'#f8a4d8', ink:'#0f0f1a', offwhite:'#fafafa', border:'#e5e5ea' } },
    fontFamily: { display:['"DM Sans"','system-ui','sans-serif'], sans:['Inter','system-ui','sans-serif'], mono:['"JetBrains Mono"','monospace'] },
  }}}
</script>
<style>
  html, body, #root { height: 100%; }
  body { font-family:'Inter', system-ui, sans-serif; color:#0f0f1a; background:#0a0915; overflow:hidden; }
  .font-display { font-family:'DM Sans', system-ui, sans-serif; letter-spacing:-0.02em; }
  .font-mono { font-family:'JetBrains Mono', monospace; }
  .grad-bg { background: linear-gradient(135deg,#6c63ff 0%,#f8a4d8 100%); }
  .grad-text { background: linear-gradient(135deg,#6c63ff,#f8a4d8); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .phone-scroll::-webkit-scrollbar { width: 0; }
  .desk-bg {
    background:
      radial-gradient(60% 60% at 30% 20%, rgba(108,99,255,0.25), transparent 70%),
      radial-gradient(50% 50% at 80% 80%, rgba(248,164,216,0.20), transparent 70%),
      #0a0915;
  }
  .phone-scaler { transform-origin: center center; }
  @keyframes confettiFall { 0% { transform: translateY(-40px) rotate(0); opacity:0;} 15% { opacity:1;} 100% { transform: translateY(900px) rotate(720deg); opacity:0;} }
  .confetti { position: absolute; width:7px; height:11px; border-radius:2px; animation: confettiFall 5s linear infinite; pointer-events:none; }
  @keyframes scaleIn { 0% { transform: scale(.4); opacity:0;} 60% { transform: scale(1.1);} 100% { transform: scale(1); opacity:1;} }
  .scale-in { animation: scaleIn .8s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes drawTick { to { stroke-dashoffset: 0;} }
  .tick { stroke-dasharray: 30; stroke-dashoffset: 30; animation: drawTick .5s .4s ease-out forwards; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <div className="desk-bg w-full h-full flex items-center justify-center p-6 relative overflow-hidden">
      <div className="absolute top-6 left-6 right-6 flex items-center justify-between text-white/60 text-[11.5px] font-mono">
        <div className="flex items-center gap-2">
          <span className="h-6 w-6 rounded-md grad-bg grid place-items-center text-white font-display font-bold text-[11px]">C</span>
          <span>cardly · success state</span>
        </div>
        <div className="px-3 py-1 rounded-full bg-white/10 border border-white/10 text-white">cardly.app/atf-26</div>
      </div>

      <div className="phone-scaler">
      <IOSDevice width={400} height={840}>
        <Page />
      </IOSDevice>
      </div>
    </div>
  );
}

function Page() {
  return (
    <div className="phone-scroll h-full overflow-y-auto bg-white relative">
      {/* Confetti */}
      <div className="absolute inset-0 pointer-events-none overflow-hidden">
        <div className="confetti" style={{left:'8%', background:'#6c63ff', animationDelay:'0s'}}></div>
        <div className="confetti" style={{left:'18%', background:'#f8a4d8', animationDelay:'.4s'}}></div>
        <div className="confetti" style={{left:'30%', background:'#ffd28a', animationDelay:'.9s'}}></div>
        <div className="confetti" style={{left:'42%', background:'#1f8a5b', animationDelay:'.2s'}}></div>
        <div className="confetti" style={{left:'54%', background:'#6c63ff', animationDelay:'1.1s'}}></div>
        <div className="confetti" style={{left:'66%', background:'#f8a4d8', animationDelay:'.6s'}}></div>
        <div className="confetti" style={{left:'78%', background:'#ffd28a', animationDelay:'1.4s'}}></div>
        <div className="confetti" style={{left:'90%', background:'#1f8a5b', animationDelay:'.8s'}}></div>
      </div>

      {/* Top */}
      <div className="px-5 pt-[80px] relative z-10">
        {/* Check */}
        <div className="flex justify-center scale-in">
          <div className="h-24 w-24 rounded-full grad-bg grid place-items-center shadow-[0_24px_60px_rgba(108,99,255,0.45)]">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
              <polyline points="20 6 9 17 4 12" className="tick" />
            </svg>
          </div>
        </div>

        <div className="text-center mt-7">
          <div className="text-[11px] font-mono tracking-widest text-brand-ink/45">SAVED TO YOUR PHOTOS</div>
          <h1 className="font-display font-bold text-[30px] leading-tight mt-2">You're <span className="grad-text">all set</span>, Adaeze.</h1>
          <p className="text-[14px] text-brand-ink/60 mt-2 max-w-[280px] mx-auto leading-relaxed">Your card is in your camera roll. Now help us fill the room — share it with three friends.</p>
        </div>

        {/* Mini card preview */}
        <div className="mt-7 mx-auto" style={{width:200, aspectRatio:'4/5'}}>
          <div className="rounded-xl overflow-hidden relative shadow-[0_16px_40px_rgba(108,99,255,0.35)] h-full" style={{background:'linear-gradient(155deg,#1b1240,#3a2068 40%,#7a3a9a 80%,#f8a4d8 130%)'}}>
            <div className="absolute -top-10 -right-10 h-28 w-28 rounded-full" style={{background:'radial-gradient(closest-side, rgba(248,164,216,0.55), transparent)'}}></div>
            <div className="absolute top-3 left-3 right-3 text-white/80 font-mono flex justify-between" style={{fontSize:6, letterSpacing:'0.18em'}}>
              <span>AFRICA · TECH · FESTIVAL</span><span>LAGOS</span>
            </div>
            <div className="absolute top-7 left-3 right-3 text-white font-display font-bold leading-[0.98]" style={{fontSize:18, letterSpacing:'-0.03em'}}>
              I'm attending<br/><span style={{background:'linear-gradient(135deg,#f8a4d8,#ffd28a)', WebkitBackgroundClip:'text', backgroundClip:'text', color:'transparent'}}>Africa Tech Festival.</span>
            </div>
            <div className="absolute bottom-2.5 left-2.5 right-2.5 flex items-end gap-2">
              <div className="h-9 w-9 rounded-full grid place-items-center text-white font-display font-bold text-[11px]" style={{background:'linear-gradient(135deg,#ffd28a,#f8a4d8)'}}>AO</div>
              <div className="flex-1 min-w-0 text-white pb-0.5">
                <div className="font-display font-bold leading-tight truncate" style={{fontSize:10}}>Adaeze Okonkwo</div>
                <div className="font-mono opacity-80 truncate" style={{fontSize:5.5}}>Lead Designer · Flutterwave</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Share prompt */}
      <div className="px-5 mt-7 relative z-10">
        <div className="text-[11px] font-mono tracking-widest text-brand-ink/45 mb-2.5">SHARE WITH 3 FRIENDS</div>
        <div className="grid grid-cols-4 gap-2">
          <ShareIcon bg="#25D366" letter="w" name="WhatsApp" />
          <ShareIcon bg="#E1306C" letter="◉" name="IG" />
          <ShareIcon bg="#0f0f1a" letter="𝕏" name="X" />
          <ShareIcon bg="#0a66c2" letter="in" name="LinkedIn" />
        </div>
      </div>

      {/* Suggested caption */}
      <div className="px-5 mt-5 relative z-10">
        <div className="rounded-2xl border border-brand-border bg-brand-offwhite p-4">
          <div className="text-[10.5px] font-mono tracking-widest text-brand-ink/45 mb-2">SUGGESTED CAPTION · TAP TO COPY</div>
          <p className="text-[13.5px] text-brand-ink/85 leading-relaxed">See you in Cape Town this November 🌍 I'm joining <b>#AfricaTechFestival '26</b>. Get your card → cardly.app/atf-26</p>
        </div>
      </div>

      {/* Event meta */}
      <div className="px-5 mt-5 relative z-10">
        <a href="#" className="flex items-center gap-3 p-3.5 rounded-2xl border border-brand-border bg-white hover:bg-brand-offwhite transition">
          <div className="h-11 w-11 rounded-xl grad-bg grid place-items-center text-white font-display font-bold text-[15px] shrink-0">A</div>
          <div className="flex-1 min-w-0">
            <div className="text-[10.5px] font-mono text-brand-ink/45">EVENT DETAILS</div>
            <div className="font-display font-bold text-[14px] leading-tight">Africa Tech Festival '26</div>
            <div className="text-[12px] text-brand-ink/55 mt-0.5">CTICC · Cape Town · 14–16 Nov 2026</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-brand-ink/40"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>

      {/* Footer */}
      <div className="px-5 pt-7 pb-10 relative z-10 text-center space-y-3">
        <button onClick={()=>window.location='E2 Preview State.html'} className="text-[13px] text-brand-primary font-medium">← Back to my card</button>
        <div className="text-[11px] font-mono text-brand-ink/40">Made on <span className="grad-text font-semibold">Cardly</span> · <a href="A1 Landing Page.html" className="underline">Run your own event</a></div>
      </div>
    </div>
  );
}

function ShareIcon({bg, letter, name}) {
  return (
    <button className="flex flex-col items-center gap-1.5 group">
      <div className="h-14 w-14 rounded-2xl grid place-items-center text-white text-[20px] font-bold shadow-md group-active:scale-95 transition" style={{background:bg}}>{letter}</div>
      <div className="text-[10px] font-medium text-brand-ink/65">{name}</div>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  function fitPhone() {
    document.querySelectorAll('.phone-scaler').forEach(el => {
      const s = Math.min(1, (window.innerHeight - 80) / 880, (window.innerWidth - 80) / 460);
      el.style.transform = 'scale(' + s + ')';
    });
  }
  window.addEventListener('resize', fitPhone);
  setTimeout(fitPhone, 50);
  setTimeout(fitPhone, 300);
</script>
</body>
</html>
