<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>I'm attending · Africa Tech Festival '26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700;9..40,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand: { primary:'#6c63ff', secondary:'#f8a4d8', ink:'#0f0f1a', offwhite:'#fafafa', border:'#e5e5ea' } },
    fontFamily: { display:['"DM Sans"','system-ui','sans-serif'], sans:['Inter','system-ui','sans-serif'], mono:['"JetBrains Mono"','monospace'] },
    boxShadow: { soft:'0 1px 2px rgba(15,15,26,0.04), 0 8px 24px rgba(15,15,26,0.06)' }
  }}}
</script>
<style>
  html, body, #root { height: 100%; }
  body { font-family:'Inter', system-ui, sans-serif; color:#0f0f1a; background:#0f0f1a; overflow:hidden; }
  .font-display { font-family:'DM Sans', system-ui, sans-serif; letter-spacing:-0.02em; }
  .font-mono { font-family:'JetBrains Mono', monospace; }
  .grad-bg { background: linear-gradient(135deg,#6c63ff 0%,#f8a4d8 100%); }
  .grad-text { background: linear-gradient(135deg,#f8a4d8,#ffd28a); -webkit-background-clip:text; background-clip:text; color:transparent; }

  /* phone scroll */
  .phone-scroll { -webkit-overflow-scrolling: touch; }
  .phone-scroll::-webkit-scrollbar { width: 0; }

  /* desk bg */
  .desk-bg {
    background:
      radial-gradient(60% 60% at 30% 20%, rgba(108,99,255,0.25), transparent 70%),
      radial-gradient(50% 50% at 80% 80%, rgba(248,164,216,0.20), transparent 70%),
      #0a0915;
  }
  /* live pulse */
  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55);} 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0);} }
  .live-dot { animation: pulse-dot 1.8s ease-out infinite; }
  /* shimmer */
  @keyframes shimmer { 0% { background-position: -200% 0;} 100% { background-position: 200% 0;} }
  .shimmer { background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }

  /* input style */
  .field {
    width:100%; padding: 14px 16px; border: 1.5px solid #e5e5ea; border-radius: 14px;
    font-size: 16px; font-weight: 500; background:#fff; color:#0f0f1a;
  }
  .field:focus { outline:none; border-color:#6c63ff; box-shadow: 0 0 0 4px rgba(108,99,255,0.12); }
  .field-label { font-size: 12px; font-weight:500; color:#6b6b78; margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .req { color:#6c63ff; }

  /* card preview */
  .card-preview { aspect-ratio: 4 / 5; }

  /* phone scaler — fit viewport (JS-driven) */
  .phone-scaler { transform-origin: center center; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

// SVG paths
const Icon = ({d, size=16, sw=1.8, fill='none'}) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}} />
);
const I = {
  cam:'<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
  shuffle:'<polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/>',
  chev:'<path d="M9 18l6-6-6-6"/>',
  check:'<polyline points="20 6 9 17 4 12"/>',
  spark:'<path d="M12 2l2.4 7.4L22 12l-7.6 2.6L12 22l-2.4-7.4L2 12l7.6-2.6z"/>',
  arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',
  copy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  refresh:'<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
};

// Preset avatars (gradient initials) — attendees would normally upload their photo
const AVATARS = [
  { id:'a', gradient:'linear-gradient(135deg,#ffd28a,#f8a4d8)', initials:'AO' },
  { id:'b', gradient:'linear-gradient(135deg,#7be0c0,#6c63ff)', initials:'KM' },
  { id:'c', gradient:'linear-gradient(135deg,#f8a4d8,#6c63ff)', initials:'TM' },
  { id:'d', gradient:'linear-gradient(135deg,#1f8a5b,#ffd28a)', initials:'AD' },
];

const COUNTRIES = ['Lagos, Nigeria','Cape Town, South Africa','Nairobi, Kenya','Accra, Ghana','Kigali, Rwanda','Dakar, Senegal','Cairo, Egypt','Addis Ababa, Ethiopia'];

function App() {
  const [name, setName] = useState('Adaeze Okonkwo');
  const [role, setRole] = useState('Lead Designer · Flutterwave');
  const [country, setCountry] = useState('Lagos, Nigeria');
  const [avatar, setAvatar] = useState(AVATARS[0]);
  const [shape, setShape] = useState('circle'); // designer-defined; attendee sees it
  const [pickerOpen, setPickerOpen] = useState(false);
  const [generating, setGenerating] = useState(false);

  const onGenerate = () => {
    setGenerating(true);
    setTimeout(()=>setGenerating(false), 1200);
  };

  return (
    <div className="desk-bg w-full h-full flex items-center justify-center p-6 relative overflow-hidden">
      {/* desktop chrome label */}
      <div className="absolute top-6 left-6 right-6 flex items-center justify-between text-white/60 text-[11.5px] font-mono">
        <div className="flex items-center gap-2">
          <span className="h-6 w-6 rounded-md grad-bg grid place-items-center text-white font-display font-bold text-[11px]">C</span>
          <span>cardly · attendee view</span>
        </div>
        <div className="flex items-center gap-4">
          <span className="hidden sm:inline">PUBLIC LINK</span>
          <span className="px-3 py-1 rounded-full bg-white/10 border border-white/10 text-white">cardly.app/atf-26</span>
          <span className="inline-flex items-center gap-1.5 text-emerald-300">
            <span className="h-1.5 w-1.5 rounded-full bg-emerald-400 live-dot"></span>
            LIVE
          </span>
        </div>
      </div>

      {/* annotation arrows */}
      <div className="hidden lg:block absolute top-1/2 left-[8%] -translate-y-1/2 text-white/45 text-[12px] font-mono max-w-[180px]">
        <div className="mb-2">No login. The link is the product.</div>
        <svg width="80" height="40" viewBox="0 0 80 40" fill="none" stroke="currentColor" strokeWidth="1">
          <path d="M0 20 Q 40 5 78 20" />
          <path d="M70 14 L 78 20 L 70 26" />
        </svg>
      </div>
      <div className="hidden lg:block absolute bottom-[12%] right-[6%] text-white/45 text-[12px] font-mono max-w-[200px] text-right">
        <svg width="80" height="40" viewBox="0 0 80 40" fill="none" stroke="currentColor" strokeWidth="1" className="ml-auto">
          <path d="M80 20 Q 40 35 2 20" />
          <path d="M10 14 L 2 20 L 10 26" />
        </svg>
        <div className="mt-2">Photo zone follows the shape the designer defined in the editor.</div>
      </div>

      {/* Phone */}
      <div className="phone-scaler">
      <IOSDevice width={400} height={840}>
        <Page
          name={name} setName={setName}
          role={role} setRole={setRole}
          country={country} setCountry={setCountry}
          avatar={avatar} setAvatar={setAvatar}
          shape={shape}
          pickerOpen={pickerOpen} setPickerOpen={setPickerOpen}
          onGenerate={onGenerate} generating={generating}
        />
      </IOSDevice>
      </div>
    </div>
  );
}

function Page({name, setName, role, setRole, country, setCountry, avatar, setAvatar, shape, pickerOpen, setPickerOpen, onGenerate, generating}) {
  const filledCount = [name, role, country, avatar].filter(Boolean).length;
  const totalFields = 4;
  const ready = name.trim().length > 1;

  return (
    <div className="phone-scroll h-full overflow-y-auto bg-white relative">
      {/* compact event header */}
      <div className="px-5 pt-[60px] pb-3 bg-white">
        <div className="flex items-center gap-2.5">
          <div className="h-9 w-9 rounded-xl grad-bg grid place-items-center text-white font-display font-bold text-[14px]">A</div>
          <div className="flex-1 min-w-0">
            <div className="text-[10px] font-mono tracking-widest text-brand-ink/45">YOU'RE INVITED TO</div>
            <div className="font-display font-bold text-[14.5px] leading-tight truncate">Africa Tech Festival '26</div>
          </div>
          <span className="inline-flex items-center gap-1 text-[10px] font-mono px-2 py-1 rounded-full bg-emerald-50 text-emerald-700">
            <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 live-dot"></span> LIVE
          </span>
        </div>
      </div>

      {/* PREVIEW */}
      <div className="px-5 pt-3">
        <div className="card-preview rounded-2xl overflow-hidden relative shadow-soft" style={{background:'linear-gradient(155deg,#1b1240,#3a2068 40%,#7a3a9a 80%,#f8a4d8 130%)'}}>
          {/* decorative */}
          <div className="absolute -top-16 -right-16 h-44 w-44 rounded-full" style={{background:'radial-gradient(closest-side, rgba(248,164,216,0.55), transparent)'}}></div>
          <div className="absolute bottom-[-40px] left-[-40px] h-40 w-40 rounded-full" style={{background:'radial-gradient(closest-side, rgba(108,99,255,0.45), transparent)'}}></div>
          <div className="absolute top-[36%] left-[6%] right-[6%] aspect-square rounded-full border border-white/10"></div>

          {/* top meta */}
          <div className="absolute top-4 left-4 right-4 flex items-center justify-between text-white/80 font-mono" style={{fontSize:8, letterSpacing:'0.18em'}}>
            <span>AFRICA · TECH · FESTIVAL</span>
            <span className="text-right">{country.split(',')[0].toUpperCase()}</span>
          </div>

          {/* hero text */}
          <div className="absolute top-10 left-4 right-4 text-white font-display font-bold leading-[0.98]" style={{fontSize:34, letterSpacing:'-0.03em'}}>
            I'm attending<br/>
            <span className="grad-text">Africa Tech Festival.</span>
          </div>

          {/* user info — photo + name + role */}
          <div className="absolute bottom-4 left-4 right-4 flex items-end gap-3">
            <div className="h-[68px] w-[68px] shrink-0 grid place-items-center text-white font-display font-bold text-[20px]"
                 style={{
                   background: avatar.gradient,
                   borderRadius: shape === 'circle' ? '50%' : shape === 'rounded' ? '18%' : '6px'
                 }}>
              {avatar.initials}
            </div>
            <div className="flex-1 min-w-0 text-white pb-1">
              <div className="font-display font-bold leading-tight truncate" style={{fontSize:18}}>{name || 'Your name'}</div>
              <div className="font-mono opacity-80 truncate" style={{fontSize:9}}>{role || 'Role · Company'}</div>
            </div>
          </div>

          {/* footer hashtag */}
          <div className="absolute bottom-1 right-2 text-white/40 font-mono" style={{fontSize:8, letterSpacing:'0.16em'}}>#ATF26</div>
        </div>

        {/* preview caption */}
        <div className="mt-2.5 flex items-center justify-between">
          <div className="text-[11px] font-mono text-brand-ink/45">LIVE PREVIEW</div>
          <button className="inline-flex items-center gap-1 text-[11px] font-mono text-brand-primary">
            <Icon d={I.shuffle} size={11} />
            shuffle look
          </button>
        </div>
      </div>

      {/* progress */}
      <div className="px-5 mt-5">
        <div className="flex items-center justify-between mb-1.5">
          <div className="text-[12px] font-medium text-brand-ink/70">Fill in your details</div>
          <div className="text-[11px] font-mono text-brand-ink/50">{filledCount}/{totalFields}</div>
        </div>
        <div className="h-1 rounded-full bg-brand-offwhite overflow-hidden">
          <div className="h-full grad-bg transition-all" style={{width: `${filledCount/totalFields*100}%`}}></div>
        </div>
      </div>

      {/* FORM */}
      <div className="px-5 pt-5 pb-32 space-y-4">

        {/* Photo upload */}
        <div>
          <div className="field-label">PHOTO <span className="req">*</span></div>
          <button onClick={()=>setPickerOpen(true)} className="w-full rounded-2xl border border-brand-border bg-white p-3 flex items-center gap-3 active:scale-[0.99] transition">
            <div className="h-14 w-14 shrink-0 grid place-items-center text-white font-display font-bold text-[16px]"
                 style={{background: avatar.gradient, borderRadius: shape==='circle'?'50%':shape==='rounded'?'18%':'6px'}}>
              {avatar.initials}
            </div>
            <div className="flex-1 text-left">
              <div className="text-[14px] font-medium text-brand-ink">Tap to change photo</div>
              <div className="text-[12px] text-brand-ink/55">Auto-crops to the {shape} shape</div>
            </div>
            <div className="h-9 w-9 rounded-xl bg-brand-offwhite grid place-items-center text-brand-ink/60">
              <Icon d={I.cam} size={16} />
            </div>
          </button>
        </div>

        {/* Name */}
        <div>
          <div className="field-label">FULL NAME <span className="req">*</span></div>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Adaeze Okonkwo" className="field" />
        </div>

        {/* Role · Company */}
        <div>
          <div className="field-label">ROLE · COMPANY</div>
          <input value={role} onChange={e=>setRole(e.target.value)} placeholder="e.g. Lead Designer · Flutterwave" className="field" />
        </div>

        {/* Country (dropdown-style) */}
        <div>
          <div className="field-label">CITY · COUNTRY</div>
          <div className="relative">
            <select value={country} onChange={e=>setCountry(e.target.value)} className="field appearance-none pr-10">
              {COUNTRIES.map(c=> <option key={c}>{c}</option>)}
            </select>
            <Icon d={I.chev} size={16} sw={2.2} />
            <span className="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-brand-ink/40">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M6 9l6 6 6-6"/></svg>
            </span>
          </div>
        </div>

        {/* Helper note */}
        <div className="flex items-start gap-2 text-[12px] text-brand-ink/55 leading-relaxed mt-2">
          <Icon d={I.spark} size={12} />
          <span>We never share your details. The card is generated on your phone and downloaded straight to your camera roll.</span>
        </div>
      </div>

      {/* Sticky CTA */}
      <div className="absolute bottom-0 left-0 right-0 px-5 pb-7 pt-4 pointer-events-none">
        <div className="absolute inset-0 -top-6 bg-gradient-to-t from-white via-white/95 to-transparent"></div>
        <button onClick={onGenerate} disabled={!ready || generating} className={"relative pointer-events-auto w-full h-14 rounded-2xl font-display font-semibold text-white text-[15.5px] transition flex items-center justify-center gap-2 " + (ready ? "grad-bg shadow-[0_8px_24px_rgba(108,99,255,0.4)] active:scale-[0.99]" : "bg-brand-border text-white/70")}>
          {generating ? (
            <>
              <svg className="animate-spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="9" opacity="0.25"/><path d="M12 3a9 9 0 0 1 9 9"/></svg>
              Generating your card…
            </>
          ) : (
            <>
              <Icon d={I.spark} size={16} fill="currentColor" sw={0} />
              Generate my card
              <Icon d={I.arrow} size={16} sw={2.2} />
            </>
          )}
        </button>
        <div className="relative mt-2 text-center text-[11px] font-mono text-brand-ink/45">
          Powered by <span className="grad-text font-semibold">Cardly</span>
        </div>
      </div>

      {/* PHOTO PICKER SHEET */}
      {pickerOpen && (
        <div className="absolute inset-0 z-50">
          <div className="absolute inset-0 bg-black/40" onClick={()=>setPickerOpen(false)}></div>
          <div className="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl pt-2 pb-8 px-5 animate-[slideUp_.25s_ease-out]" style={{animation:'slideUp .25s ease-out'}}>
            <div className="mx-auto w-10 h-1 rounded-full bg-brand-border mb-4"></div>
            <div className="font-display font-bold text-[18px]">Add your photo</div>
            <div className="text-[13px] text-brand-ink/60 mb-5">Auto-cropped to a {shape}. You can also use one of these placeholders.</div>

            <button className="w-full flex items-center gap-3 p-3.5 rounded-2xl border border-dashed border-brand-primary/40 bg-brand-primary/5 mb-4">
              <div className="h-10 w-10 rounded-xl grad-bg grid place-items-center text-white">
                <Icon d={I.upload} size={16} />
              </div>
              <div className="flex-1 text-left">
                <div className="text-[14px] font-medium text-brand-primary">Upload from camera roll</div>
                <div className="text-[11px] text-brand-ink/55">JPG or PNG · auto-cropped</div>
              </div>
            </button>

            <div className="text-[11px] font-mono tracking-widest text-brand-ink/40 mb-3">OR PICK A PLACEHOLDER</div>
            <div className="grid grid-cols-4 gap-3 mb-2">
              {AVATARS.map(a => (
                <button key={a.id} onClick={()=>{setAvatar(a); setPickerOpen(false);}} className={"aspect-square grid place-items-center text-white font-display font-bold text-[18px] transition " + (a.id===avatar.id ? "ring-2 ring-brand-primary ring-offset-2" : "")}
                  style={{background:a.gradient, borderRadius: shape==='circle'?'50%':shape==='rounded'?'18%':'8px'}}>
                  {a.initials}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// keyframes for sheet slide-up
const style = document.createElement('style');
style.innerHTML = `@keyframes slideUp { from { transform: translateY(100%);} to { transform: translateY(0);} }`;
document.head.appendChild(style);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  function fitPhone() {
    document.querySelectorAll('.phone-scaler').forEach(el => {
      const s = Math.min(1, (window.innerHeight - 80) / 880, (window.innerWidth - 80) / 460);
      el.style.transform = 'scale(' + s + ')';
    });
  }
  window.addEventListener('resize', fitPhone);
  setTimeout(fitPhone, 50);
  setTimeout(fitPhone, 300);
</script>
</body>
</html>
