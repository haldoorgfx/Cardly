<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>L4 — How It Works · Cardly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <style>
      html, body {
        background: #ECE6D7;
        color: #0F1F18;
        font-family: "Inter", system-ui, sans-serif;
        margin: 0; padding: 0;
        -webkit-font-smoothing: antialiased;
      }
      .font-display { font-family: "DM Sans", sans-serif; letter-spacing: -0.02em; }
      .font-mono { font-family: "JetBrains Mono", monospace; }

      .viewport-frame {
        position: relative;
        background: #FAF6EE;
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 30px 60px -20px rgba(15, 31, 24, 0.25),
          0 10px 20px -10px rgba(15, 31, 24, 0.18),
          inset 0 0 0 1px rgba(15, 31, 24, 0.06);
      }
      .viewport-chrome {
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 28px;
        background: linear-gradient(to bottom, #F1E9D6, #ECE2CB);
        border-bottom: 1px solid rgba(15, 31, 24, 0.08);
        display: flex; align-items: center;
        padding: 0 12px;
        gap: 6px;
        z-index: 2;
      }
      .viewport-chrome .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(15,31,24,0.15); }
      .viewport-chrome .url {
        margin-left: 10px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: #6B7A72;
        text-transform: uppercase;
      }
      .viewport-frame iframe {
        display: block;
        border: 0;
        background: #FAF6EE;
        margin-top: 28px;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel">
      const { DesignCanvas, DCSection, DCArtboard } = window;

      function FramedIframe({ width, height, label }) {
        return (
          <div className="viewport-frame" style={{ width, height }}>
            <div className="viewport-chrome">
              <span className="dot" />
              <span className="dot" />
              <span className="dot" />
              <span className="url">cardly.app/how-it-works · {label}</span>
            </div>
            <iframe
              src="how-it-works-page.html"
              title={`Use cases · ${label}`}
              style={{ width, height: height - 28 }}
              scrolling="no"
            />
          </div>
        );
      }

      function App() {
        const desktop = { w: 1280, h: 7020 };
        const tablet  = { w: 768,  h: 6970 };
        const mobile  = { w: 375,  h: 7480 };

        return (
          <DesignCanvas
            title="L4 — How It Works"
            subtitle="Four-step walkthrough · product mocks · responsive across 3 viewports"
          >
            <DCSection
              id="viewports"
              title="How it works · responsive"
              subtitle='Quick-jump strip in hero links to each step · click "Play" on the video demo'
            >
              <DCArtboard
                id="desktop"
                label="Desktop · 1280 px"
                width={desktop.w + 24}
                height={desktop.h + 24}
              >
                <div style={{ padding: 12 }}>
                  <FramedIframe width={desktop.w} height={desktop.h} label="desktop" />
                </div>
              </DCArtboard>

              <DCArtboard
                id="tablet"
                label="Tablet · 768 px"
                width={tablet.w + 24}
                height={tablet.h + 24}
              >
                <div style={{ padding: 12 }}>
                  <FramedIframe width={tablet.w} height={tablet.h} label="tablet" />
                </div>
              </DCArtboard>

              <DCArtboard
                id="mobile"
                label="Mobile · 375 px"
                width={mobile.w + 24}
                height={mobile.h + 24}
              >
                <div style={{ padding: 12 }}>
                  <FramedIframe width={mobile.w} height={mobile.h} label="mobile" />
                </div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
