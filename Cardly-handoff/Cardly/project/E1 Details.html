<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>E1 · Details Form — Cardly Attendee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family:'Inter',system-ui,sans-serif; background:#efece4; color:#0F1F18; }
  @keyframes cardFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  @keyframes caretBlink { to { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="arrival-card.jsx"></script>
<script type="text/babel" src="details-screen.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const DetailsScreen = window.DetailsScreen;
  return (
    <DesignCanvas>
      <DCSection
        id="details"
        title="E1 · Details Form"
        subtitle="Live preview + grouped form + sticky CTA. Mobile = empty state · Tablet = in-progress · Desktop = inline validation error."
      >
        <DCArtboard id="mobile" label="Mobile · 375 · Empty" width={375} height={1200} data-screen-label="E1 Details · Mobile">
          <DetailsScreen variant="mobile" width={375} height={1200}/>
        </DCArtboard>
        <DCArtboard id="tablet" label="Tablet · 700 · In progress" width={700} height={1280} data-screen-label="E1 Details · Tablet">
          <DetailsScreen variant="tablet" width={700} height={1280}/>
        </DCArtboard>
        <DCArtboard id="desktop" label="Desktop · 1280 · Validation error" width={1280} height={860} data-screen-label="E1 Details · Desktop">
          <DetailsScreen variant="desktop" width={1280} height={860}/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
