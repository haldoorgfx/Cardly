<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  html, body, #root { margin: 0; min-height: 100%; }

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
function App() {
  const PublishScreen = window.PublishScreen;
  return (
    <DesignCanvas>
      <DCSection
        id="d3"
        title="D3 · Publish &amp; Share (v2)"
        subtitle="Organizer-side post-publish page redesigned to match the forest/cream system. Density: mono labels, 6px radii, panel cards, live stats strip."

        <DCArtboard id="published" label="Desktop · 1280 · Published" width={1280} height={1480} data-screen-label="D3 v2 · Published">

}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
