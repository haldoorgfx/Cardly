<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Your card · Africa Tech Festival '26</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700;9..40,800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { brand: { primary:'#6c63ff', secondary:'#f8a4d8', ink:'#0f0f1a', offwhite:'#fafafa', border:'#e5e5ea' } },
    fontFamily: { display:['"DM Sans"','system-ui','sans-serif'], sans:['Inter','system-ui','sans-serif'], mono:['"JetBrains Mono"','monospace'] },
  }}}
</script>
<style>
  html, body, #root { height: 100%; }
  body { font-family:'Inter', system-ui, sans-serif; color:#0f0f1a; background:#0a0915; overflow:hidden; }
  .font-display { font-family:'DM Sans', system-ui, sans-serif; letter-spacing:-0.02em; }
  .font-mono { font-family:'JetBrains Mono', monospace; }
  .grad-bg { background: linear-gradient(135deg,#6c63ff 0%,#f8a4d8 100%); }
  .grad-text { background: linear-gradient(135deg,#f8a4d8,#ffd28a); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .phone-scroll { -webkit-overflow-scrolling: touch; }
  .phone-scroll::-webkit-scrollbar { width: 0; }
  .desk-bg {
    background:
      radial-gradient(60% 60% at 30% 20%, rgba(108,99,255,0.25), transparent 70%),
      radial-gradient(50% 50% at 80% 80%, rgba(248,164,216,0.20), transparent 70%),
      #0a0915;
  }
  .phone-scaler { transform-origin: center center; }
  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,0.55);} 50% { box-shadow: 0 0 0 6px rgba(34,197,94,0);} }
  .live-dot { animation: pulse-dot 1.8s ease-out infinite; }
  @keyframes burst { 0% { transform: scale(.85); opacity: 0;} 100% { transform: scale(1); opacity:1;} }
  .burst { animation: burst .5s cubic-bezier(.2,.8,.2,1) both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="ios-frame.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState } = React;

function App() {
  return (
    <div className="desk-bg w-full h-full flex items-center justify-center p-6 relative overflow-hidden">
      <div className="absolute top-6 left-6 right-6 flex items-center justify-between text-white/60 text-[11.5px] font-mono">
        <div className="flex items-center gap-2">
          <span className="h-6 w-6 rounded-md grad-bg grid place-items-center text-white font-display font-bold text-[11px]">C</span>
          <span>cardly · preview state</span>
        </div>
        <div className="px-3 py-1 rounded-full bg-white/10 border border-white/10 text-white">cardly.app/atf-26</div>
      </div>

      <div className="phone-scaler">
      <IOSDevice width={400} height={840}>
        <Page />
      </IOSDevice>
      </div>
    </div>
  );
}

function Page() {
  const [toast, setToast] = useState(null);
  const showToast = (t) => { setToast(t); setTimeout(()=>setToast(null), 1800); };

  return (
    <div className="phone-scroll h-full overflow-y-auto bg-white relative">
      {/* Header */}
      <div className="px-5 pt-[60px] pb-3 bg-white sticky top-0 z-20 border-b border-brand-border">
        <div className="flex items-center gap-2.5">
          <button onClick={()=>window.location='E1 Attendee Public Page.html'} className="h-9 w-9 rounded-xl bg-brand-offwhite grid place-items-center text-brand-ink/60">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>
          </button>
          <div className="flex-1 min-w-0">
            <div className="text-[10px] font-mono tracking-widest text-brand-ink/45">YOUR CARD IS READY</div>
            <div className="font-display font-bold text-[14.5px] leading-tight truncate">Africa Tech Festival '26</div>
          </div>
          <span className="inline-flex items-center gap-1 text-[10px] font-mono px-2 py-1 rounded-full bg-emerald-50 text-emerald-700">
            <span className="h-1.5 w-1.5 rounded-full bg-emerald-500 live-dot"></span> LIVE
          </span>
        </div>
      </div>

      {/* Big card */}
      <div className="px-5 pt-5 burst">
        <div className="rounded-2xl overflow-hidden relative shadow-[0_24px_60px_rgba(108,99,255,0.35)]" style={{aspectRatio:'4/5', background:'linear-gradient(155deg,#1b1240,#3a2068 40%,#7a3a9a 80%,#f8a4d8 130%)'}}>
          <div className="absolute -top-16 -right-16 h-44 w-44 rounded-full" style={{background:'radial-gradient(closest-side, rgba(248,164,216,0.55), transparent)'}}></div>
          <div className="absolute bottom-[-40px] left-[-40px] h-40 w-40 rounded-full" style={{background:'radial-gradient(closest-side, rgba(108,99,255,0.45), transparent)'}}></div>
          <div className="absolute top-[36%] left-[6%] right-[6%] aspect-square rounded-full border border-white/10"></div>

          <div className="absolute top-4 left-4 right-4 flex items-center justify-between text-white/80 font-mono" style={{fontSize:8, letterSpacing:'0.18em'}}>
            <span>AFRICA · TECH · FESTIVAL</span><span>LAGOS</span>
          </div>
          <div className="absolute top-10 left-4 right-4 text-white font-display font-bold leading-[0.98]" style={{fontSize:34, letterSpacing:'-0.03em'}}>
            I'm attending<br/><span className="grad-text">Africa Tech Festival.</span>
          </div>
          <div className="absolute bottom-4 left-4 right-4 flex items-end gap-3">
            <div className="h-[68px] w-[68px] shrink-0 rounded-full grid place-items-center text-white font-display font-bold text-[20px]" style={{background:'linear-gradient(135deg,#ffd28a,#f8a4d8)'}}>AO</div>
            <div className="flex-1 min-w-0 text-white pb-1">
              <div className="font-display font-bold leading-tight truncate" style={{fontSize:18}}>Adaeze Okonkwo</div>
              <div className="font-mono opacity-80 truncate" style={{fontSize:9}}>Lead Designer · Flutterwave</div>
            </div>
          </div>
          <div className="absolute bottom-1 right-2 text-white/40 font-mono" style={{fontSize:8, letterSpacing:'0.16em'}}>#ATF26</div>
        </div>
        <div className="mt-3 text-center">
          <div className="text-[12.5px] text-brand-ink/55">1080 × 1350 px · PNG · ready to share</div>
        </div>
      </div>

      {/* Primary action */}
      <div className="px-5 mt-5">
        <button onClick={()=>showToast('Saved to your camera roll')} className="w-full h-14 rounded-2xl grad-bg text-white font-display font-semibold text-[16px] shadow-[0_8px_24px_rgba(108,99,255,0.4)] active:scale-[0.99] transition flex items-center justify-center gap-2">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download my card
        </button>
      </div>

      {/* Secondary share actions */}
      <div className="px-5 mt-3">
        <div className="text-[11px] font-mono tracking-widest text-brand-ink/45 mb-2.5 mt-2">OR SHARE DIRECTLY</div>
        <div className="grid grid-cols-2 gap-2.5">
          <ActionBtn bg="#25D366" name="WhatsApp" letter="w" onClick={()=>showToast('Opening WhatsApp…')} />
          <ActionBtn bg="#E1306C" name="Instagram" letter="◉" onClick={()=>showToast('Saved · open IG to share')} />
          <ActionBtn bg="#0f0f1a" name="Post on X" letter="𝕏" onClick={()=>showToast('Opening X…')} />
          <ActionBtn bg="#0a66c2" name="LinkedIn" letter="in" onClick={()=>showToast('Opening LinkedIn…')} />
        </div>
      </div>

      {/* Caption */}
      <div className="px-5 mt-5">
        <div className="text-[11px] font-mono tracking-widest text-brand-ink/45 mb-2">SUGGESTED CAPTION</div>
        <div className="rounded-2xl border border-brand-border bg-brand-offwhite p-4">
          <p className="text-[13.5px] text-brand-ink/85 leading-relaxed">See you in Cape Town this November 🌍 I'm joining <b>#AfricaTechFestival '26</b> with 25,000+ builders shaping what comes next. Get your card → cardly.app/atf-26</p>
          <button onClick={()=>showToast('Copied to clipboard')} className="mt-3 inline-flex items-center gap-1.5 text-[12px] font-medium text-brand-primary">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy caption
          </button>
        </div>
      </div>

      {/* Secondary actions */}
      <div className="px-5 pt-5 pb-8 space-y-2.5">
        <button onClick={()=>window.location='E1 Attendee Public Page.html'} className="w-full h-12 rounded-2xl border border-brand-border bg-white text-[14px] font-medium hover:bg-brand-offwhite transition inline-flex items-center justify-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
          Edit my info
        </button>
        <button onClick={()=>window.location='E3 Success.html'} className="w-full h-11 text-[13px] text-brand-ink/55 hover:text-brand-ink transition">
          I'm done — close
        </button>
        <div className="text-center text-[11px] font-mono text-brand-ink/40 pt-2">Powered by <span className="grad-text font-semibold">Cardly</span></div>
      </div>

      {/* Toast */}
      {toast && (
        <div className="absolute top-[80px] left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-full bg-brand-ink text-white text-[12.5px] font-medium shadow-lg flex items-center gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><polyline points="20 6 9 17 4 12"/></svg>
          {toast}
        </div>
      )}
    </div>
  );
}

function ActionBtn({bg, name, letter, onClick}) {
  return (
    <button onClick={onClick} className="h-14 rounded-2xl bg-brand-offwhite hover:bg-brand-offwhite/80 transition flex items-center gap-2.5 px-3 active:scale-[0.98]">
      <div className="h-9 w-9 rounded-xl grid place-items-center text-white text-[14px] font-bold" style={{background:bg}}>{letter}</div>
      <div className="text-left">
        <div className="text-[13.5px] font-medium leading-tight">{name}</div>
        <div className="text-[10.5px] text-brand-ink/45">Share now</div>
      </div>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  function fitPhone() {
    document.querySelectorAll('.phone-scaler').forEach(el => {
      const s = Math.min(1, (window.innerHeight - 80) / 880, (window.innerWidth - 80) / 460);
      el.style.transform = 'scale(' + s + ')';
    });
  }
  window.addEventListener('resize', fitPhone);
  setTimeout(fitPhone, 50);
  setTimeout(fitPhone, 300);
</script>
</body>
</html>
