<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>E1.5 · Crop Modal — Cardly Attendee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family:'Inter',system-ui,sans-serif; background:#efece4; color:#0F1F18; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="crop-modal.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const CropModalScreen = window.CropModalScreen;
  return (
    <DesignCanvas>
      <DCSection
        id="crop"
        title="E1.5 · Photo Crop Modal"
        subtitle="Full-screen sheet on mobile/tablet; centered 600px dialog on desktop. Dimmed ink-80 backdrop, cream frame, primary slider, secondary re-upload, primary confirm."
      >
        <DCArtboard id="mobile" label="Mobile · 375 · Full-screen" width={375} height={780} data-screen-label="E1.5 Crop · Mobile">
          <CropModalScreen variant="mobile" width={375} height={780}/>
        </DCArtboard>
        <DCArtboard id="tablet" label="Tablet · 700 · Full-screen" width={700} height={900} data-screen-label="E1.5 Crop · Tablet">
          <CropModalScreen variant="tablet" width={700} height={900}/>
        </DCArtboard>
        <DCArtboard id="desktop" label="Desktop · 1280 · 600px dialog" width={1280} height={860} data-screen-label="E1.5 Crop · Desktop">
          <CropModalScreen variant="desktop" width={1280} height={860}/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
